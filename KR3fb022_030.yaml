body:
  text: 然莫辨竟視為紙上之繁文矣余因倣王肻堂先生箋律之意循書之次序逐行遂事全卷為之疏解務使旨義昭著人人能讀其書而并能用其書實得尊王之意而便民用所以佐厯非以淆厯豈妄論隂陽五行之謂哉或謂厯頒天下自互古迄今從未有人解之釋之者惟近世浙閩蕭薛汪鄭諸家集為通書每年行世闡發厯中之義幾幾乎詳且盡矣今復有是書無乃多其辭説以滋惑耶余曰不然聖朝頒厯但云其然而不言其所以然其不言所以然者以為斯民既如寶之自必能尋繹其旨而體會其義如必欲言其所以然則簡帙繁多適足淆其觀覽惟待知者探索之愚者問學之而無如人之
