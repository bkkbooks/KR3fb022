body:
  text: 人生大事莫重于娶婦盖上以衍宗祧之不替下以繼中饋之蘋蘩凡翁姑夫婦人倫寓焉厨竈第堂起居藉矣曷可使其犯所不當犯者乎言周堂者猶言室家也不犯周堂似亦宜其室家之義耳乾爲父老翁也故翁居乾位坤爲母姑婆也故姑居坤位坎第宅也宅居北而南向故第居坎位艮爲竈丙火之長生也故竈居艮位巽爲厨萬物潔齊之所故厨居巽位兌爲堂内堂也處于公婆之間者也故堂居兌位婦居于震者東方生氣之主而婦人在厨竈之間以主中饋者也夫爲離位者南方離明之位也夫居離而婦居震木火之相資以婦而助夫以木而生火有雷火之象焉大
  hash: sha256:8b3d09e3bdb48bcbcb2a2ffbfb97ba167255408db32d1d350ad7b1e0b84d82b0
