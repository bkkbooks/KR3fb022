body:
  text: 以便省覽而又明列各蒙古于首直行欲知某蒙古某月時刻縱横查之卽得真正時刻説已見前前則兩京十四省此則各蒙古其直看各蒙古地方大字横推太陽晝夜刻分小字其法皆同歲各省節氣時刻各依序次悉依地之經度所列各省所在地方或東或西或南或北或上下參差相距遠近不侔然雖幅員之内各有分野地之經度所属上合之以太陽躔度葢太陽之出入于赤道也南二十三度半而冬至北二十三度半而夏至内外不異而往來有漸每日所躔因其在所出地高低以推在所節氣時刻故各方節氣非在一時也雖在一時而刻數有初
