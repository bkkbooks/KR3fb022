body:
  text: 而生者强而立感隂而生者柔而靡謂之靡草則至隂之所生也故不勝至陽而死此月陽盛其草隂類故死秋者百榖成熟之期于時雖夏于麥則秋乃麥成熟登場之時故曰麥秋日刻後曰躔實沈之次小滿為四月中氣所云某日某時某刻乃交小滿之日時刻也後者交小滿時刻起至五月夏至中氣時刻前皆屬日躔實沈之次實沈申宮也宜用甲丙庚壬時甲時寅正三刻至卯初二刻丙時已正三刻至午初二刻庚時申正三刻至酉初二刻壬時亥正三刻至子初二刻
  hash: sha256:61d9410e66d48c63eb2ba8f8a60d85c31b151066206c18ef1cb5d9f93fbed029
