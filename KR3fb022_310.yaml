body:
  text: 數之學莫不以時為重故書必收其例于每月之內豈小補干世哉苐時惟十二今倍其十二而二十四焉蓋太陽一晝夜行周天三百六十五度遍歷十二宮太陽到子宮則子時到丑宮則丑時然子宮有壬癸二十夾于左右也太陽雖到子宮必由壬而入然後歷子過癸出子宮而入丑是子時一宮而三時寓焉用子時之初則壬時也用子時之中則正子也用子時之末則癸時也按圖辨之暸然自曉至于二十四時之中獨取四時之義則以太陽是月所躔之宮是孟則四孟時皆吉太陽所躔之宮是仲則四仲時皆吉太陽所躔之宮是季則四季時皆吉周干維而不用支者干支同氣地支得天干以助其生成也
