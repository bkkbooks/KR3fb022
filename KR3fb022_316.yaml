body:
  text: 癸卯年赤碧黑假如癸卯年八月卯年是上元年分八月是一白值月卽以一白值月星入飛宮掌八月紫白九星黄白白中宮則一白在中二黑飛到乾三碧飛到兌四錄飛到艮五黄飛到離六白飛到坎假如式紫白綠七赤到坤八白到震九紫到巽而九宮之紫白九星皆得矣餘倣此例六十甲子值日每日各有一干支甲子主值如初一是庚午值日初二卽是辛未值日初三壬申初四癸酉六十甲子順捱值日周而復始萬古不參錯一日其始初第一日是五星聯珠日月合璧從天正甲子年甲子月甲子日甲子時而起逓排主值每日至今禽星
