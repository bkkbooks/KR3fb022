body:
  text: 宮太原仇南陽甘渤海針河西景晉陽幸雁門司頓丘韶太原薊內黃薄雁門白陽南屠陳留蒙安定鬱太原雙天水貢廣陵逢譙國冉武陵桂天水牛隴西農雁門晏齊郡閻太原充贊皇茹河內容燉煌戈臨海暨渤海都黎陽耿高陽滿河東寇上谷廣丹陽闕下邳嬊京兆隆南陽勾平陽敖譙國融南康簡范陽空弱丘沙汝南乜晉昌豐括陽荆廣陵紅平昌遊廣平恆譙國居渤海仰汝陽屯晉陽權天水柏譙國公括陽鹿河南酒江陵欽太原栗黎陽蹇山陽奄黃內覆姓歐陽渤海東方平原大叔東平公孫高陽仲孫高陽閭丘頓丘水丘吳興南門河南折中京兆豆盧范陽商姓屬金王太原蔣樂安韓高陽陽弘農何盧江張清河戚東海謝陳留相魏郡章河間潘榮陽葛頓丘奚譙國郎中山昌汝南花東平方河南柳河東雷馮翊賀廣平湯中山塢穎川安武威常平原
