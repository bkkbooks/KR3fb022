body:
  text: 相勝而成音土必以火陶成器而後有音所謂相假以成音亦自然之理也太玄數甲巳子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五巳亥無干四納音取象黃帝以干支配成六十號曰花甲子借意而喻誠為玄奧起於子為一陽終於亥為六隂起於甲陽干之首終於癸隂干之未各有金木水火土以屬之甲子乙丑何以取象為海中之金蓋氣在包藏有名無形猶人之在母腹也壬寅癸卯絶地存金氣尚柔弱薄若繒縞故曰金箔金庚辰辛已以金居火土之地氣巳發生金尚在礦寄形生養之鄉受西方之正色乃曰白
  hash: sha256:b38e896f10c1d1f930b121071d64fdef985a905fc742524c9266ef075981565f
