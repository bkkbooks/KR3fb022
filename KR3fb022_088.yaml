body:
  text: 可向其例如子年則子上是太歲丑年則丑上是太歲餘倣此歲刊歲刑者太歲所刑之辰也刑僇也自刑辰午酉亥各自刑其辰無禮刑子刑卯卯刑子無思刑寅刑巳巳刑申申刑寅恃勢刑丑刑戍戌刑未未刑丑此五行生旺之氣恃強相刑其方忌興工修造博戲爭訟犯之主爭鬬血光其例如戌年則未上是歲刑卯年則子上是歲刑酉年即是酉上是歲刑餘倣此歲破即大耗
