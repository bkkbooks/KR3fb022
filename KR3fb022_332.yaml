body:
  text: 各事項條目上表章上官入學嫁娶結婚修置産室冠帶會親友進人口掃舍宅竪柱上梁平治道路修造動土破土破屋壊垣安碓音對磑音位磨也交易開市立券納財出行捕捉田獵移徒安床經絡裁衣針刺牧養栽種伐木開渠穿井療病沐浴剃頭祭祀啓攅安葬朔望弦晦月者太隂之精魄者月之體也朔望弦晦皆從日之離合以盖月本無光受日則光合璧謂之朔近一遠三謂之弦相與爲衡分天之中則謂之望以速及舒光靜體復則謂之晦月光常滿而有弦晦朔
