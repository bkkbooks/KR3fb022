body:
  text: 但書內嘗有一月之內或並列兩定或並列兩除兩閉之類此因下月之節氣已到或上月之節氣未過前節之終後節之始此兩日各依本月內起建法故有重建並列之異然于例則同也假如七月建申則戌日當是滿星值日而第二日亥日當是平今第二亥日不是平而亦是滿此兩滿並列之故也須知第二亥日乃是寒露八月節當從八月建酉論故滿在亥第一日之滿從七月也第二日之滿從八月也凡遇兩字並列之日即前後月交界節氣之日建者萬氣由此而立也立則舊者除而新者生矣生則滿而實矣滿則平而無缺缺矣平則定矣然而滿則溢恐其覆也而執守之不敢肆也日中則昃天之道也雖執之必破也既破矣不慮其危乎危然
