body:
  text: 緧縮也日刻白露八月節白露是八月節某日某時某刻者交白露之時刻也未交白露時刻之前尚屬七月節氣管轄凡諸八月吉凶星辰及七十二候皆從交白露日時刻之後起處暑後十五日斗指庚為白露言隂氣漸重露凝而白也後十五日斗指酉為秋分隂生于午極于亥故酉其中分也仲月之節為秋分秋為隂中隂陽適中書夜長短亦均焉天道東北行宜向東北行宜修造東北維天道乃天體運旋之氣八月節內行于東北人能趨向其方及修
