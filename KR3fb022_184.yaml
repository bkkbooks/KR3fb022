body:
  text: 正月建寅易説卦帝出乎震故以歲之三月日正月正本音去聲之切秦始皇名政改從平聲後世因之寅津也謂生物之津塗也天開于子地闢于丑人生于寅斗柄建此三辰之月皆可以為歲首而夏商周迭用之夏以寅為人正商以丑為地正周以子為天正然時以作事則歲月自當以人為紀故孔子云行夏之時周書曰萬物春生夏長秋收冬藏天地之正四時之極不易之道夏數得天百王所同是以千古取其時之正而以正月建寅為歲首永不易也正月大小有不同之時而建寅則永無改易其所加寅上之干則
