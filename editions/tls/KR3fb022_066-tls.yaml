body:
  text: 相勝而成音土必以火陶成噐而後有音所謂相假以成音亦自然之理也太玄數甲巳子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五巳亥無干四納音取象黄帝以干支配成六十號曰花甲子借意而喻誠爲玄奥起於子爲一陽終於亥爲六隂起於甲陽干之首終於癸隂干之未各有金木水火土以屬之甲子乙丑何以取象爲海中之金蓋氣在包藏有名無形猶人之在母腹也壬寅癸卯絕地存金氣尚柔弱薄若繒縞故曰金箔金庚辰辛已以金居火土之地氣巳發生金尚在鑛寄形生養之鄉受西方之正色乃曰白
  hash: sha256:08b80d092229555aecdc292224ffddec5caf5cde4dd51f0698b5854fb67d24e6
