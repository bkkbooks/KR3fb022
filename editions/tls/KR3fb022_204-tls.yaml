body:
  text: 黑赤碧酉上元年二月白綠紫未中元年二月黄白白亥下元年二月白黄白是此局碧黑赤是此局紫白綠是此局此月家紫白九星立成上中下三元年分二月定局之圖也假如癸卯年二月卯年是上元年分則九星圖是第一局凡属卯年皆属上元年分同此第一局取用餘例推三月建辰三月大小有不同之時而建辰則永無移易辰震也言時物盡震動而長也日刻淸明三月節淸明是三月節某日某時某刻者交淸明之時刻也未交淸明時
