body:
  text: 頭者神所居上圖象天子卦爲朝故名元首君子重之雖疏滌之㣲不敢忽也每月惟十三日宜之申酉亥子亦吉者金水相生也遊禍日不宜服藥正寅五午九戌月已日一十亥二卯六未月寅日七申十一子三辰月亥日四已八酉十二丑月申日又不宜滿日言满日亦不宜服藥乃三舍之臨官也而日遊禍者盖爲刦殺所冲刦也其例如正月五月九月逢已日卽是遊禍餘月倣此天火日不宜苫盖編茅以覆屋也正寅五午九戌月子日十亥二卯六未月卯日七申十一子三辰月午日四巳八酉十二丑月酉日
  hash: sha256:12fe3e76b513c1c9da7e8942878b7ce6fe4abe9e9bd84e4e004621d5ad1a1366
