body:
  text: 女八字配合如何若男女八字四柱相合亦未可棄也盖吉無十全但得中平亦爲次吉神而明之存乎其人男女起造合九宮宅元訣三元男女各從本宮上起甲子入十二支辰掌男順行女逆行尋本命所落何辰就于其宮起一十順行零年節節數去看行年泊于何宮惟辰戌天羅地網二宮貴人不臨之地若行年泊在此二宮之年不可起造其餘十支辰宮位上行年泊之皆可用十二支辰掌男女宮數入十二支辰掌訣一宮坎入子二宮坤入申三宮霞入卵四宮巽入已五宮中男女入丑未六宮乾入亥七宮兌入酉八宮艮入寅九宮離入午
