body:
  text: 加箋釋凡厯之所載全民利用者條爲兮而縷為析以副聖天子敬授斯民至意務使讀厯者吉㐫避就触目了然無事向剋擇之門奉其瞽論而閭左之用日以愈弘非敢谓有裨扵朝廷之治竊與大清律箋釋之㫖㣲有合爾且書中祇釋夲義馀無所及視太史公歴書之載大小餘
