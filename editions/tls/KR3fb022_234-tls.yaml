body:
  text: 之事葢物得氣之先殺氣未肅而鷙猛之鳥已習于摯迎殺氣之微也凉風未至而鳴隂之物已居于壁迎凉風之微也腐草得署温之氣化而爲螢離明之極故幽類化爲明類也土之氣潤故蒸螢而爲濕署六月建未主東井井主水土卽潤溽則大雨應時而行日刻後日躔鶉火之次大暑爲六月中氣所云某日某時某刻乃交大暑之日時刻也後者自交大暑時刻起至七月處署中氣時刻前皆属日躔鶉火之次鶉火午宮也宜用癸乙丁辛時
  hash: sha256:587a548c76ca464088ccdb1a13cbea444782754127f7f61e517185de7006a3f4
