body:
  text: 姻交易栽植及成就諸事皆吉收者聚歛也宜耕種收歛之財貸及捕捉等事開者闢也創也啓而通也百事俱吉惟忌安葬遁甲爲地四戶通書爲四大利星閉者塞也掩而合也不通之謂也宜安葬吉擇鑑云十二建星惟取除定危開四星爲上吉在遁甲經爲地四戶三元經爲四大利其滿成執閉建破平收各有宜忌土王用事王讀旺四立前十八日爲土王金木水火土各王七十二日而成歲功故四時各王七十二日惟土王于四季之月以助未之生金之成火之長
  hash: sha256:b466810cf4f49ebe558fd973dc8c3c43e5a6aaca22ca5840053ac5e80655e276
