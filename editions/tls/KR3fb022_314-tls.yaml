body:
  text: 九月起三碧十月起二黑十一月起一白十二月起九紫上例乃求每月值月星之硬局也如上元年分所云正月起八白八白卽值月星也知此值月星然後可求八方分占之紫白其法以值月星入飛宮掌中宮順飛九星佈之八方卽得是月之紫白九星圖矣但須分别上中下三元年分若是子午卯酉年則爲上元年分正月是八白值月以八白入中宮飛尋八方紫白若是寅申巳亥下元年分則正月是二黑值月又當以二黑入中宮飛尋矣故欲得每月九星紫白圖須先分其年分是上中下何元然後査此元内所用事月分是何星值月然後卽以此值月星入排山飛宮掌中宮按九星次序飛出八方則九宮之星皆得矣
