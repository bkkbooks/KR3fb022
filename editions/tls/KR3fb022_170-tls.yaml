body:
  text: 正之先後也卽以冬至喻之如京師冬至在夘時向東之地爲辰愈東必且爲巳矣向西爲寅愈西必且爲丑矣又如雲貴地方之各節氣俱早于他省較之江浙所在俱早一時而至朝鮮盛京福建浙江江南山東江西河南湖廣廣東山西廣西陝西貴州四川雲南盛京十四省中内有兩省併合並書者其節氣相同也都城順天府之節氣已見于前故此不列其查看法先尋直行大字省分地方然後横推查某節氣時刻分數立春雨水驚蟄春分淸明榖雨立夏小滿芒種夏至小暑大暑立秋處暑白露秋分寒露霜降
