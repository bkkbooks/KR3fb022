body:
  text: 九星次序一白二黑三碧四綠五黃六白七赤八白九紫三元年白起訣六十年爲一元一百八十年爲三元今康熙二十三年甲子爲上元上元一白起甲子上元甲子年起一白挨歲按訣逆加九星則乙丑年九紫丙寅年八白餘年倣此推尋中元四綠却爲頭中元甲子年起四綠挨歲按訣逆加九星則乙丑年三碧丙寅年二黑丁卯年一白餘例推下元七赤兌方發下元甲子年起七赤挨歲按訣逆加九星則乙丑年六白丙寅年五黃逐年照此例求自得逆尋年分把星流並逆布九星看用事年分得何星其所得之星卽值年星也假如上元丙寅年欲求九星所占方位圖則以八白值年星上元丙寅年八白是值年星加入飛宮掌中宮按星之次序從乾從兌順飛出八方則知乾上是柯星兌上艮上及餘宮是何星而九宮所占之紫白皆得矣但厯上無中宮八卦寫出要知九字之居中者爲中宮左
