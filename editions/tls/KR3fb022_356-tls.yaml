body:
  text: 十日在腰背太陽分剌之腰背僂十一日在鼻柱陽明分剌之則齒面腫十二日在髮際少陽分剌之耳重聽十三日在牙齒少隂分剌之氣塞十四日在胃脘陽明分剌之氣脹十五日在徧身不補不瀉大禁十六日在胸太陽分剌之主逆息十七日在氣衝陽明分剌之難息穴也在臍下十八日在股内少隂分剌之引隂氣痛十九日在足陽明分剌之發腫二十日在内踝少隂分剌之脛筋急二十一日在手小指太陽分剌之手不仁二十二日在外踝少陽分剌之脛銅人圖云筋緩及胷目下二十三日在肝及足厥隂分剌之發轉筋二十四日在陽明剌之咽巾不銅人利胃也圖云二十五日在足陽明剌之胃氣脹二十六日在胸太隂分剌之令人喘咳二十七日在膝陽明分剌之足脛厥逆二十八日在隂少隂分剌之小腹急痛二十九日在膝脛厥隂分剌之筋痿少力
  hash: sha256:02de5dcd6f4f2c4bdcc6509339ca9bd400d4b88a3284258a88e21267345d4fc7
