body:
  text: 黑赤白子午卯白綠碧辰戌丑黄白紫寅申已紫黄白酉上元年四月白黑赤未中元年四月碧白綠亥下元年四月綠碧白是此局白紫黄是此局赤白黑是此局此月家紫白九星立成上中下三元年分四月定局之圖也假如亥年亥是下元年分用下元第三局是也餘倣此例取五月建午五月大小有不同之時而建午則永無改易午長也大也言物皆長大也日刻芒種五月節芒種是五月節某日某時某刻者交芒種之時刻也未交芒種時
