body:
  text: 排山乾六宮兌七宮艮八宮離九宮上元男七宮起甲子中元男一宮起甲子並逆行九宮中五宮男寄坤二宮女寄艮八宮宮起甲子並逆行上元女五宮起甲子中元掌訣巽四宮震三宮坤二宮坎一宮女二宮起甲子下元女八宮起甲子並順行右三元男女先定上中下何元然後于排山掌内按宮起甲子男逆女順尋生年在何宮所得之宮卽書上之宮數也假如男命二十歲壬午今壬午是上元年分生人則于兌七宮起甲子逆行乙丑六宮丙寅五宮丁卯四宮按序數至壬午泊于七宮故書上書壬午水二十歲馬男七宮卽此例也又如女命十五歲丁亥是上元年分生人則子中五宮起甲子順
