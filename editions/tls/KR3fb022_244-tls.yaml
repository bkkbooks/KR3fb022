body:
  text: 宜用甲丙庚壬時甲時寅正三刻至卯初二刻丙時已正三刻至午初二刻庚時申正三刻至酉初二刻壬時亥正三刻至子初二刻白綠碧子午卯黄白紫辰戌丑黑赤白寅申已白黑赤酉上元年七月碧白綠未中元年七月紫黄白亥下元年七月白紫黄是此局赤白黑是此局綠碧白是此局此月家紫白九星立成上中下三元年分七月定局之圖也假如午年七月午是上元年分則七月紫白九星圖是上元第一局八月建酉八月大小有不同之時而建酉則永無更易酉緧也謂時物皆
