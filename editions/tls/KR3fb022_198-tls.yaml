body:
  text: 日夜分也夏冬不言分者天地二氣而已陽生子極午卽其中分故言至不言分也天道西南行宜向西南行宜修造西南維天道乃天體運旋之二月節内行于西南維而人趨向其方及修造此方所谓順天之道乗時之氣自膺多福維方隅也乾坤艮巽爲四維坎離震兑爲四正天德在坤月厭在酉月殺在戌月德在甲月合在巳月空在庚此六位所占方位年年二月節內永定不移内惟天德月德月合月空乃吉神月厭月殺是凶煞甲巳庚上宜修造取土
