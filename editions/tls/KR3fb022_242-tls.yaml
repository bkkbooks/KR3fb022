body:
  text: 凉風至則天地之仁氣散矣白露降則隂乗陽而其候交矣寒蟬鳴則物之生于暑者其聲變矣鷹乃祭鳥謂鷹欲食鳥之時先殺鳥而不食似人之食必祭先代爲食之人鷹至不仁也必祭而後食而况于人乎此言時主殺氣而物之司殺者應時而動也秋者隂之始冬者隂之終秋属金金乃肅殺之氣故于孟秋言天地始肅禾黍稷之属至此時而皆成熟矣故曰禾乃登日刻曰躔鶉尾之次處暑爲七月中氣所云某日某時某刻者交處暑之時刻也後者自交處暑時刻起至八月秋分中氣時刻前皆属日躔鶉尾之次鶉尾已宮也
  hash: sha256:1bfe555e2e0b2a3472c05da74f7c87295f67f4fca57de17680994ab55857d3cd
