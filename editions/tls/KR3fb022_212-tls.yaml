body:
  text: 碧白赤子午卯紫黃綠辰戌丑白黑白寅申已白白黑酉上元年三月赤碧白未中元年三月綠紫黃亥下元年三月黄綠紫是此局黑白白是此局白赤碧是此局此月家紫白九星立成上中下三元年分三月定局之圖也假如辰年三月辰是中元年分則九星圖用中元第二局是也餘倣此四月建已四月大小有不同之時而建已則永不變易已起也物至此時畢盡而起也日刻立夏四月節立夏是四月節某日某時某刻者交立夏之時刻也未交立夏時
