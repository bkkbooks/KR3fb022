body:
  text: 大中央戊巳其位土行周四季戊陽土也萬物生而出之萬物伐而八之已隂土也無所爲而得已者也又云戊茂也已起也土行四季之末萬物含秀者抑屈而起也西方庚辛其位金行秋之令庚乃隂干陽更而續者也辛乃陽在下隂在上隂干陽極於此庚更故也而辛新也庚辛皆金金味辛物成而後有味又云萬物肅然更改秀實新成北方壬癸其位水行冬之令壬之言任也壬乃陽生之位壬而爲胎萬物懷妊於壬與子同意癸者揆也天令至此萬物閉藏懷妊於其下揆然萌芽此天之道也淸陽爲天五行彰而十干立濁隂爲地八方定而十二支分蓋子者北方至隂寒水之位而一陽肇生之始故隂極則陽生壬而爲
  hash: sha256:159f99c1cb4537a38460bfa92060b4ff6017cef1c5f9e84f3e16247fe23f0132
