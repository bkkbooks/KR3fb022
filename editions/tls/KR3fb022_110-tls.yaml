body:
  text: 陽爲伏兵陽之灾來緩也故主有暗傷隂爲大禍隂之禍烈也故遇凶無解二神犯之皆主立有灾咎其例如午年則壬上是伏兵癸上是大禍餘倣此破敗五鬼破敗五鬼五行之精氣也主虚耗之事尤忌修造其例看納甲五行本年干属於何卦其卦所對冲者是也葢冲破納甲之辰也如乾納壬甲冲乾者巽也坤納乙癸冲坤者艮也艮納丙冲艮者坤也兌納丁冲兌者震也離納已而巳年在坎坎納戊而戊年在離震納庚而兌冲之巽納辛而乾冲之故曰破敗也曰五鬼者八卦不外干五行也甲年巽乙年艮丙年坤丁年震戊
