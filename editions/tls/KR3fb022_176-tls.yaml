body:
  text: 秋得金之氣成于夏火剋金也六月節小暑六月中大暑夏至後暑已盛不當又謂之小殊不知易曰寒往則暑來暑往則寒來寒暑相催而歲成焉通上半年之半皆可謂暑通下半年之半皆可謂寒正月暑之始十二月寒之終而曰大暑小暑者不過上半年辭耳六月中暑之極故謂大然則未至于大則猶爲小也七月中處暑七月暑之終寒之始大火西流暑氣于是乎處矣處者隱也藏伏之義也白露八月節寒露九月節秋本属金金色白金氣寒白者露之色寒者露之氣先白而氣始寒固有漸也九月霜降露寒始結爲霜也立冬後曰小雪大雪寒氣始于露中于霜终于雪霜之前爲露露由白而始寒霜之後爲雪由小而至大皆有漸也
