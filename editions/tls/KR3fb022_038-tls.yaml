body:
  text: 謂其的于何所主管何所司屬則未敢確謂其然也至其情性之不同氣化之純駁所以旉施或異是殆理之所固然又未可以爲妄誕也厯本文皆用大字其中有用者因其隨時更易不能一定故以圈記之箋釋諸説或由經傳或出叢書今不記出某書者因余丙申居王峯時諸友以厯書相質問隨意編輯無刊佈之心故未及詳記况内有斷章取義者亦有叅以臆見而集爲一説者不敢妄指出自某書間有詳述者皆丙申後所編也厯中之理錯綜紛雜各條之下僅言其㫖明顯易知而止若多繁衍
  hash: sha256:30928246ae3b9e21cb965cff5bd501af2e97af203b20408f8d35ae820e7b2eb6
