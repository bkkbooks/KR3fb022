body:
  text: 歲破乃太歲所冲之辰也子午冲丑未冲寅申冲卯酉冲辰戌冲巳亥冲所在之方不可興工動土修作移徙嫁娶遠行安葬犯之傷宅長損財物更忌立倉庫莊廂置田產又損六畜歲破可向不可坐卽歲破之日亦不可修造動作其例如丑年則未上是歲破未年則丑上是歲破酉年則卯上是歲破餘倣此歲殺卽的殺一名人中殺又名大禁歲殺乃三合局之養位寅午戌年在丑巳酉丑年在辰申子辰年在未亥卯未年在戌三合之首以墓覆之隂毒之甚者也如寅午戌火局之三合也而丑臨於寅之上使火之無光辰
