body:
  text: 雞戌宮之中星婁金狗亥宮之中星室火猪中氣全而偏氣雜故二十八宿只以十二命之或謂天干無属相而地支有属相何也盖夭干動而地支靜輕淸者天也重濁者地也重濁之中乃有物馬故天干無而地支有也又曰十二属相各有不全其義何居此隂陽不備皆有至理其原備詳箋説惟人獨會其全此其所以貴也男女九宮九宮之法以上中下三元甲子年分配以洛書九宮八卦每年男女各属一宮以求婚元宅元等例婚元合婚之用宅元造作之用其例詳左男女合婚法卽呂才婚元訣
  hash: sha256:d95d7c416163206fa2d3f6349cf002c1ce77b651524f46237a2d88a79a57060b
