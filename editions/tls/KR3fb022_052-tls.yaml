body:
  text: 月之節淸明小暑寒露小寒爲四季月之節總孟仲季十二月之節得十有二焉謂之節春三月中氣雨水春分穀雨夏三月中氣小滿夏至大暑秋三月中氣處暑秋分霜降冬三月中氣小雪冬至大寒合十二月之中氣亦十有二焉謂之中惟閏無中氣斗指兩辰之間尚書正義節氣者周天三百六十五日四分日之一分爲十二月則月各得三十日十六分日之七以初爲節氣半爲中氣故一歲有二十四氣分居辰次焉凡五日一候三候爲氣六氣成時四時成歲月令章句中必在其月節不必在其月本月之節嘗有不在本月
  hash: sha256:7002ca6b8a441aa9f4d5e26476636fe0725afb1404e4b1c393a7fce24375722c
