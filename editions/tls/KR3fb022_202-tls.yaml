body:
  text: 候左右之時也雷是陽氣與隂相冲其聲發掦也電是陽光陽微則光不見此月陽氣盛以摯于隂故其光乃見也日刻後曰躔降婁之次春分爲二月中氣所云某日某時某刻乃交春分之日時刻也後者自交春分時刻起至三月榖雨中氣時刻前皆属日躔降婁之次降婁戌宮也宜用艮巽坤乾時艮時丑正三刻至寅初二刻巽時辰初三刻至正二刻坤時未正三刻至申初二刻乾時戌初三刻至正二刻綠紫白子午卯白白黄辰戌丑赤碧黑寅申已
  hash: sha256:395c71434ab18479cc061cae6e9950764ca370d7694966124d2cee65da3c82c4
