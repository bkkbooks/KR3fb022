body:
  text: 黄白紫子午卯黑赤白辰戌丑白綠碧寅申巳碧白綠酉上元年正月紫黄白未中元年正月白黑赤亥下元年正月赤白黑是此局綠碧白是此局白紫黄是此局此月家紫白九星立成上中下三元年分正月定局之圖也假如甲子年正月子年是上元年分則九星圖是上元第一局又如壬寅年正月寅年是下元年分則九星圖是下元第三圖餘倣此其起例吉凶詳後二月建卯二月大小有不同之時而建卯則永無更易卯茂也言陽生而孶茂也
