body:
  text: 之所宜同其例如正月節氣内逢丁日卽是天德所值之日二月逢申日卽是天德所值之日餘倣此歲德年干甲乙丙丁戊巳庚辛壬癸直看年横推日甲庚丙壬戌甲庚丙壬戌日日日日日日日日日日宜上官赴任百事吉其例如甲年不拘何月但逢甲日卽是歲德值日餘年倣此月德寅午戌月在丙申子辰月在壬亥卯未月在甲巳酉丑月
