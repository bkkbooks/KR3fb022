body:
  text: 本朝定鼎都直隸順天府禹貢冀州之域天文尾箕分野今首列順天府節氣時刻者重皇畿也凡順天省内節氣時刻則準此若別省節氣時刻又不同於此當查後各省節氣時刻局内自明正月二月三月四月五月六月七月八月九月十月十一月十二月日與天會一歲一次而二十四氣由之以生然二十四氣凡三百六十日有奇而周月與日會一歲十二次而十有二朔由之以合然十有二朔凡三百五十四日有奇而周歲從太陽一日一度一年行一周天而與天會則歲功成故曰歲月從太隂一日十三度有奇一月行一周天而與日會則月朔定故曰月
  hash: sha256:726d5bdab6bf4c450979425048c728d526af75f601ca1a5ce1a3dcafc0233f36
