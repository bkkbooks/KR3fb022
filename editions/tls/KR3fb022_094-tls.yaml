body:
  text: 子辰年在午巳酉丑年在卯犯之主人財衰耗災生不測其例如巳年則卯上是災煞亥年則酉上是災殺餘倣此刧殺災殺歲殺謂之三殺者如寅午戌會火局也而亥子丑之水不附焉乃恃水而剋火以賊刧其歲而亥孟神也刧之始也子仲神也災所由興也丑季神也藏奸而爲歲君之難者也故曰三殺如亥卯未則從亥至未而申酉戌不在合内者矣申子辰從申至長而巳午未不在合内者矣己酉丑從巳至丑而寅卯辰不在合内者矣金以犯木火以乾水木以屈金如羣盗焉黨而刧其君也然合三殺之中仲神主之孟神始之季神藏而合之者也刧災的三殺此通天竅相尅之位也如申子辰年會水殺在南方巳午未初爲刧殺言其驟也中爲災殺言其傷也未爲的殺言其决也殺同而取義異耳太隂太隂自子年起戌順行十二辰在太歲之後二辰謂之歲后卽貴
  hash: sha256:6b8fb48ec2d70645f40ec09ba2088a4dbeeee80d411ca7da7f0781687c0eb7e5
