body:
  text: 望者所見之地不同也朔初一朔蘇也月死復蘇也日月之交故曰合朔望十五日月對照如相望也人居其間盡覩其面是謂相與爲衡居天之中而爲望然望日非永定十五亦有十六十七之時弦上弦初八下弦廿三弦弓弦也半明半晦半曲半直其形如弦此因日照其側人觀其旁是謂近一分逺三分也盖天四分之人但見日照之一分而未見其所不能覩者之三分初八是月盈及一半如弓之上弦廿三是月虚及一半如弓之下弦此以前後盈虚之不同而以上下二字别之也然上弦又非永定初八亦有初七初九之時下弦亦非永定廿三亦有廿二廿四之時其上前
  hash: sha256:76cb8b73d60f46a7cf93acf1a138f2187a580743d64f8f28c863193b88a03fc6
