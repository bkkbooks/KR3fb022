body:
  text: 十日出日日入其餘各月分看法俱照此例晝刻本日日出八晝夜時刻其後六日皆同十日夜刻二二日出其上頂格之各月初日十日二十日十日入日與下底格之初日十日二十晝刻日諸日期每年移前趲後各有参差日夜刻不同之時不可以定例求十二日出日十日八内下底格大字書夏至冬至並列者以晝刻此二日日出日入畫刻夜刻互換相同日夜刻而絕無凿毫之異過此二日則漸有伸初月日出縮之不侔矣故夏至晝刻長短分數卽日初日入冬至夜刻長短分數冬至晝刻長短分晝刻數卽夏至夜刻長短分數冬至日出辰初日夜刻之刻數卽夏至日入戌之刻數夏至日九月初日出出寅之刻數卽冬至日入申之刻數此日日八日之出入互換晝夜長短互換故大書晝刻夏至冬至並列以明之十日夜刻二
