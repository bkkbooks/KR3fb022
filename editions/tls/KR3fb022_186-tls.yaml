body:
  text: 每年一易五年而仍還其原干要知每年正月是何建干但以五虎遁年上求月取之五虎遁例見後日刻立春正月節立春爲正月節氣所云某日某時某刻者乃交立春節之時刻也凡立春時刻之前尚属舊年十二月節氣所轄葢諸月家吉凶神煞及七十二候皆從本月節起不從本月朔起故凡属正月不從正月朔起必從立春節起也假如正月初一日正直立春則無叅前落後之分今立春不在初一而在初六則正月初一至初五尚作舊年十二月節氣主事此則節未至而朔先到者也又如舊年十二月十八立春則十八日卽作新年正月節主事凡正月神煞
  hash: sha256:328dbb07e9402a2cf8fdfd566942a7768c35f7b92687c9d3d92024f6162ca398
