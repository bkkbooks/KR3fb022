body:
  text: 胎子之爲子此十一月之辰也至丑隂尚執而紐之又丑隂也助也謂十二月終始之際以結紐爲名焉寅正月也陽已在上隂已在下人始見之時故律管飛灰以候之可以述事之始也又寅津也演也謂物之津塗卯日升之時也又卯茂也言二月陽氣盛而孳茂辰者陽已過半三百之時物盡震而長又謂辰言震也已者四月正陽而無陰也自子至巳陽之位陽於是盡又巳起也物畢盡而起午者陽尚未屈隂始生而爲主又云午長也大也物至五月皆豐滿而長大也未六月木已種而成矣又云未味也物成而有味與辛同意申者七月之辰申陽所爲而巳隂至於申則上下通而人始見白露葉落乃其候也可以述隂事以成之又云申身
  hash: sha256:bd9bebd58a2e5ae59d61c95283cbe32a69d20ab70c8588b70b60cfa168e917fe
