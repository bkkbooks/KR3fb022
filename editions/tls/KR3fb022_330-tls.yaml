body:
  text: 水之藏也故于四季之月各旺十八日共成七十二日也土王用事後忌動土築隄破土若安葬啓攅又所不忌世謂戊已日忌動土不知惟土王用事後忌戊已日動土餘月戊已固不忌也嘗見土王用事後但非戊已日用之破土亦在安吉每日宜忌每日之下所書宜某事不宜某事皆從各家隂陽五行生剋制化審定而來盖一日必有一日之吉神亦必有一日之㐫殺苐吉凶神殺各有宜忌之不同今不書神煞之吉凶而但書事之宜與不宜者從簡也故立成明白宜忌于每日條下并選定宜用某時之類皆所以便人之易覧也
  hash: sha256:44fa159cf21608568cf2e3c0dcb492b412f142f8c8069249c9d1aeaee4347a80
