body:
  text: 也季月用艮巽坤乾者四庫之陽維也辰巽未坤戌乾丑艮之同氣也以地支而得天干同氣以助其生成所以曰煞沒曰四考四孟四仲四季也凡作事用此時百無禁忌晝夜循環時刻子子初三刻至正二刻癸子正三刻至丑初二刻丑丑初三刻至正二刻艮丑正三刻至寅初二刻寅寅初三刻至正二刻甲寅正三刻至卯初二刻卯卯初三刻至正二刻乙卯正三刻至辰初二刻辰辰初三刻至正二刻巽辰正三刻至已初二刻巳巳初三刻至正二刻丙巳正三刻至午初二刻午午初三刻至正二刻丁午正三刻至未初二刻未未初三刻至正二刻坤未正三刻至申初二刻申申初三刻至正二刻庚申正三刻至酉初二刻酉酉初三刻至正二刻辛酉正三刻至戌初二刻戌戌初三刻至正二刻乾戌正三刻至亥初二刻亥亥初三刻至正二刻壬亥正三刻至子初二刻
