body:
  text: 不知察焉卽或有心于斯道者又無人以啓發之徒有寶厯之心而無用厯之實可嘅也夫卽蕭薛諸家不過踵事增華惟便于剋擇家日者用誠每年簡易通書耳故其名亦秖曰通書而已與此箋釋書判若兩途未可同日而語子不見經書白文簡易直捷亦有讀之而不能知其義者必經註疏而白文之㫖大著今是書雖不敢與經書註疏比亦此意耳豈滋惑之謂哉嘗見不善讀厯者置不知者于勿問而已知者又混拈卽如四月初一辰時正二刻立夏而辰時正一刻及初一二三四刻尚屬三月節管事若以上四刻及正一刻卽作立夏論則所誤惟刻數之幾微而所差竟夏春之逈別且各省遲早又是不同此省立夏是正
