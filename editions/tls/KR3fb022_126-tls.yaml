body:
  text: 此方位無吉凶神殺所占是空位也故曰空黑赤白一白位坎休門属水二黑位坤死門属土三碧位震傷門属木四綠位巽杜門属木紫黃白五黃居中属土绿碧白六白位乾開門属金七赤位兌驚門属金八白位艮生門属土九紫位離景門属火此年神方位圖中央所列之紫白九星也出于洛書戴九履一左三右七二四爲肩六八爲足五寄中宮爲王因其敘以成九疇葢河圖圓洛書方圓者天體星也紀厯之數兆于河圖方者地體土也書州井田之法倣于洛書掌中按指節排布九宮順飛則從中五次乾六再次兌七以及艮八離九坎一坤二震三巽四按其順數而行逆飛則從中五次巽四又次震三以及坤二坎一離九艮八兌七乾六按其逆數而行餘倣此
  hash: sha256:20e1183d2f0b2a4712a458264f39f53a38cc43084fa647f2e485038988d44d37
