body:
  text: 鑞金甲午乙未則氣已成物質自堅實混於沙而別於沙居於火而煉於火乃曰沙中金也壬申癸酉氣盛物極當施收斂之功頴脫鋒銳之刃蓋申酉金之正位干值壬癸金水淬礪故取象劍鋒而金之功用極矣至戌亥則金氣藏伏形體已殘煆煉首餙已成其狀藏之閨閣無所施爲而金之功用畢故曰庚戌辛亥釵釧金壬子癸丑何以取象桑柘木蓋氣居盤屈形狀未伸居於水地蠶衰之月桑柘受氣取其時之生也庚寅辛卯則氣已乘陽得栽培之勢力其爲狀也奈居金下凡金與霜素堅木居下得其旺歲寒後凋取其性之堅也故曰松柏木戊辰已巳則器不成量物
