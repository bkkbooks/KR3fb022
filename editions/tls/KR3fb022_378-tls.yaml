body:
  text: 康京兆元河南平河内黄江夏姚吳興邵專陵湛豫章汪平陽狄云水臧東海伏太原成上谷茅東海龎平始項魯國祝太原梁安定杜京兆阮陳留席安定麻上谷强天水賈武威路内黄危晉江江淮陽顏魯國郭太原徐東海駱内黄蔡濟陽樊上黨萬扶風柯濟陽盧范陽莫鉅鹿房清河解平陽杭餘杭左濟陽崔博陵鈕吳興程安定嵇譙國邢河間滑下邳裴河東榮上谷惠扶風邴平陽糜汝南巫平陽牧弘農山河内全京兆班扶風伊太原暴魏郡邰平原鄂武昌籍廣平藺中山隂始平能太原蒼武陵党馮翊申魏郡郤濟陽桑黎陽夀京兆通西河冀渤海尚黨上温太原柴平陽慕燉煌習東陽向河内庚濟郡衡雁門匡晉陽文雁門歐平陽鞏山陽厙内黄巢彭城關隴西査汝南蓋汝南益馮翊蒯襄陽傅清河羊太山郗山陽闞天水南汝南商京兆佘雁門葉南陽鄞汝南留安南鐸鄱陽介河内慶河内長河南萇魏郡㧞琅琊過高平靖臨清附南陽譙京兆
