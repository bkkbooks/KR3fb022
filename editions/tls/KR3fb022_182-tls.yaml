body:
  text: 説已見前各省條内各蒙古住牧邉外本朝分爲四十九旗自關東海邉直至正北自正兆接着正西自正西接着西南自正北而言其地界以黑龍江爲北界又名烏龍江卽古之所謂鴨緑江也鴨緑江之北阿羅蘇住之江北一大山名牙撒以山頂分水爲界水往南流中國之山也水向北流阿羅蘇之山也前漢朝刻字分界于山頂之上今亦仍舊總見本朝德盛溥博徧及遐方因并記之男承樞景璠校字
