body:
  text: 戾之氣爲殃弔客喪門官符等煞人事之不祥已寓大耗小耗泠退之徵歲破歲刑亂臣之比至若歲刼三殺則又國之奸而爲惡最烈者也神雖三十有二理通人事無殊非通書不經之神廼五行自然之道造修埋葬趨避宜知動作遷更審詳毋忽太歲又曰歲君卽太歲堆黄氣化之運無有停機故立春前屬舊歲立春後卽屬新歲凡月日時之吉㐫神殺星辰皆統於歲故曰歲君如百執之統於天子也太歲者卽本年之太歲也十二年一周人君之象也率領諸神統正方位斡旋時序總成歲功者也冝相和相合不宜犯之所在之處不冝修作動土安葬移居百事㐫犯之損宅長太歲可坐不
