body:
  text: 而生者强而立感隂而生者柔而靡謂之靡草則至隂之所生也故不勝至陽而死此月陽盛其草隂類故死秋者百榖成熟之期于時雖夏于麥則秋乃麥成熟登塲之時故曰麥秋日刻後曰躔實沈之次小满爲四月中氣所云某日某時某刻乃交小满之日時刻也後者交小满時刻起至五月夏至中氣時刻前皆属日躔實沈之次實沈申宮也宜用甲丙庚壬時甲時寅正三刻至卯初二刻丙時已正三刻至午初二刻庚時申正三刻至酉初二刻壬時亥正三刻至子初二刻
  hash: sha256:78257fdd68956f79332d1c0452d3c3d793b86d0bd6c500cf3a6f3a4f2392aee1
