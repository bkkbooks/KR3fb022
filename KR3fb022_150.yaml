body:
  text: 其例如立夏節後至土王日之前七十二日内遇寅日卯日皆是母倉日餘春秋冬及土王後同此類推各神出遊日卽本厯後太歲已下神煞出遊日甲子乙丑丙寅丁卯戊辰此五日出東方遊宜修南西北方吉丙子丁丑戊寅巳卯庚辰此五日出南方遊宜修西方吉庚子辛丑壬寅癸卯甲辰此五日出西方遊宜修東南方吉壬子癸丑甲寅乙卯丙辰此五日出北方遊宜修東南西方吉戊子巳丑庚寅辛卯壬辰此五日出中宮遊四方修造皆可各神還位日已巳庚午辛未壬申癸酉甲戌乙亥七日還東
