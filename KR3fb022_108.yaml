body:
  text: 喪亂之事忌動土修方併主患目甲巳年午未申酉方庚午辛未天金神壬申癸酉地金神乙庚年辰巳方庚辰辛已天地金神同位丙辛年寅卯午未子丑方庚寅辛卯庚子辛丑天金神甲午乙未地金神丁壬年寅卯戌亥方壬寅癸卯地金神庚戌辛亥天地金神同位戊癸年申酉子丑方庚申辛酉天金神甲子乙丑地金神其例如庚年則辰巳二方是金神巳年則午未申酉四方是金神餘倣此伏兵大禍伏兵大禍夾子劫殺災殺的殺之間其干為伏兵大禍所謂三殺在支伏兵大禍在干是也寅午戌在壬癸水剋火也亥卯未在庚辛金剋木也申子辰在丙丁火乾水也巳酉丑在甲乙木屈金也
  hash: sha256:3a9784348363008fb9c403a7f3479a2f275c49a5b758fa000ff15483eda6e69a
