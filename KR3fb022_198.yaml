body:
  text: 日夜分也夏冬不言分者天地二氣而已陽生子極午即其中分故言至不言分也天道西南行宜向西南行宜修造西南維天道乃天體運旋之二月節內行于西南維而人趨向其方及修造此方所謂順天之道乘時之氣自膺多福維方隅也乾坤艮巽為四維坎離震兑為四正天德在坤月厭在酉月殺在戌月德在甲月合在巳月空在庚此六位所占方位年年二月節內永定不移內惟天德月德月合月空乃吉神月厭月殺是凶煞甲巳庚上宜修造取土
  hash: sha256:a088112610c4eb57e440a5c6c9af75fa7e26a82056e648527f0008b0a97711a2
