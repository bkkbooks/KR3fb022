body:
  text: 子正北其卦爲坎午正南其卦爲離卯正東其卦爲震酉正西其卦爲兌此四方正位不書卦而書支艮東北巽東南坤西南乾西北此四維方位不書支而書卦四正四維旣定則秩然八卦各奠其位矣于子午卯酉四正位則左右輔之以壬癸丙丁甲乙庚辛八干于乾坤艮㢲四維位則左右輔之以戌亥未申丑寅辰己八支共成二十四方位位雖二十有四其定卦維八以統之也故壬子癸坎卦也丑艮寅艮卦也甲卯乙震卦也辰㢲巳㢲卦也丙午丁離卦也未坤申坤卦也庚酉辛兌卦也戍乾亥乾卦也一卦三山所以分別一卦中之左右隂陽不同之氣也凡物各有一太極大而六合九州卽此八卦方隅小而斗室尺地亦卽此八卦方隅卽如數十里數畝之地宅或數分一席之地亦皆有八卦二十四山所屬故云物物一太極凡埋葬修造動作不論隂陽二宅先須格定此二十四位然後查用事方位向道上神殺吉㐫以酌趨避之宜
