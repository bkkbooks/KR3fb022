body:
  text: 七十二候亦皆從十八日起此則節先超過本月朔朔未至而節先到者也故立春在舊年十二月者書上有年前二字大寒後十五日斗指艮爲立春立始建也春氣始至故謂之立也後十五日斗指寅爲雨水雨水中氣也言雪散爲雨水矣天道南行宜向南行宴修造南方天道乃天體運旋之氣正月節内行于南方而人趨向其方及修造此方所謂順天之道乗時之氣自獲吉應天德在丁月厭在戌月殺在丑月德在丙月合在辛月空在壬此六位所占之方位年年正月節内永定不移内惟天德月德月合月空乃吉神月厭月殺是凶煞
  hash: sha256:3d1b0a065821e664c745dccef229069c59a1557702d6e984826a13606a1bc0e6
