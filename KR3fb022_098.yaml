body:
  text: 戌年在坤其方不宜穿掘修營向之極吉候歲天道天月德同到泥飾大利其例如寅年則艮上是奏書酉年則坤上是奏書餘倣此博士博士常居奏書之對奏書治政於內博士綱紀於外掌天子明堂政治之神也故起於巽之明堂也居四維而不中者謙而不敢自專所以維持天子坐鎮四隅者也以四序五行論凡在墓絶間曰博士有出潛龍見之意向之最吉其宜忌與奏書同其例如卯年則申上是博士午年則乾上是博士餘倣此大將軍
  hash: sha256:4a16c3ea7c40d86220624943a01313e04a5b770db592166bf9dbdfaf6e550c53
