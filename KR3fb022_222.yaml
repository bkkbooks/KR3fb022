body:
  text: 刻之前尚属四月節氣主事凡諸五月内吉凶神殺及七十二候皆從交芒種之日時刻後起小满後十五日斗指丙爲芒種言有芒之榖可播種也後十五日斗指午爲夏至言萬物于此假大而極至也種上聲天道西北行宜向西北行宜修造西北維天道乃天體運旋之氣五月節内行于西北而人趨向其方及修造此方所謂順天之道乘時之行有不獲其吉應乎天德在乾月厭在午月殺在丑月德在丙月合在辛月空在壬此六位所占方位年年五月節内永定不移内惟天德月德月合月空乃吉神月厭月殺乃凶煞
  hash: sha256:169181e444b104a369277fd584e7de922555669974db945a10c1d906bd698357
