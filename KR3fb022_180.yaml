body:
  text: 也橫列于上自立春至大寒皆大字頂格順排以列于上也欲知某省某節時刻先看第一直行大字省分所謂縱也然後橫推看所查某節之下時刻所謂橫也每十五分為一刻各省俱依省城所定一晝夜分十二時一時各八刻一刻十五分積十二時得九十六刻計分得一千四百四十分一省必有一省之省城省城一省之中也故定各省之節氣必以省城為主歲各蒙古節氣時刻各蒙古序次悉依地圖地之經度所列右節氣各有諸方不同之數橫列于上欲知某蒙古某節時刻縱橫查之即得真正時刻每十五分為一刻俱依蒙古居處所定
