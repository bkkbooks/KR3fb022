body:
  text: 凡開山立向修方安門入宅定磉得三白九紫到方位不忌將軍太歲大小耗官符及作主本命行年諸凶煞不能為害故修造必先合紫白方位為第一務右各神所臨之地惟奏書博士宜向之右各神乃上年神方位圖內三十二位之神也所臨之地謂所到之宮位也內惟奏書博士二神即歲之喜神方也故宜向之吉餘各有所忌餘者除奏書博士二吉神之外尚有三十位神殺其中有忌起造者有忌修方者有忌葬埋者有忌動土者有忌修方而不忌起造葬埋者有忌起造而不忌埋葬修方者亦有忌修不忌葬而忌動
  hash: sha256:1c72764bd7487f0953135168b7aa91028ae64cfe1d1ede67dd19d0c6d0674d6e
