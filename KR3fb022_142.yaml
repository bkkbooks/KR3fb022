body:
  text: 此天德所合之干故曰天德合營爲百事皆吉惟忌詞訟其例如四月節内逢丙日卽是天德合所值之日餘倣此歲德合年千甲乙丙丁戊巳庚辛壬癸直看年横推日巳乙辛丁癸巳乙辛丁癸日日日日日日日日日日其例如庚年不拘何月逢乙日卽是歲德合值日又如辛年不拘何月逢辛日卽是歲德合值日餘倣此主百事吉月德合寅午戌月在辛亥卯未月在巳申子辰月在丁巳酉丑月在乙此五行生炁之辰相扶爲福所值之日所在之位百事皆
