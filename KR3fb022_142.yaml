body:
  text: 此天德所合之干故曰天德合營為百事皆吉惟忌詞訟其例如四月節內逢丙日即是天德合所值之日餘倣此歲德合年千甲乙丙丁戊巳庚辛壬癸直看年橫推日巳乙辛丁癸巳乙辛丁癸日日日日日日日日日日其例如庚年不拘何月逢乙日即是歲德合值日又如辛年不拘何月逢辛日即是歲德合值日餘倣此主百事吉月德合寅午戌月在辛亥卯未月在巳申子辰月在丁巳酉丑月在乙此五行生氣之辰相扶為福所值之日所在之位百事皆
