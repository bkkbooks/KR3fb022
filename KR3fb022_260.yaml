body:
  text: 于隂中其色正應隂之盛故也豹將食獸先殺而祭明報本不敢先也草木感肅殺之氣故業黃木落蟄蟲前月但藏而不戶至此月垂頭向下以隨陽氣蓋陽氣微沉于下也又塗塞其戶穴以避地上隂殺之氣也日刻後日躔大火之次霜降為九月中氣所云某日某時某刻乃交霜降之時刻也後者自交霜降時刻起至十月小雪中氣時刻前皆屬日躔大火之次大火卯宮也宜用癸乙丁辛時癸時子正三刻至丑初二刻乙時卯正三刻至辰初二刻
