body:
  text: 此方所謂順天之道乘時之氣自獲吉應天德在癸月厭在辰月殺在未月德在壬月合在丁月空在丙此六位所占方位年年七月節內永定不移內惟天德月德月合月空乃吉神月厭月殺是凶煞丙丁壬上宜修造取土丙上有月空丁上有月合壬上有月德此三方吉神所占故宜修造取土是月也涼風至立秋上五日白露降立秋中五日寒蟬鳴立秋下五日鷹乃祭鳥處暑上五日天地始肅處暑中五日禾乃登處暑下五日
