body:
  text: 歲德在合在歲德者歲干德也甲丙戊庚壬陽德自處君子之立身行道也乙丁己辛癸從干合爲德者隂從陽婦從夫也如甲年其德在甲自處也巳年其德亦在甲從夫也故甲巳德在甲乙庚德在庚丙辛德在丙丁壬德在壬戊癸德在戊此德神也用之主集福消殃歲合者歲干合也甲年合在巳乙年合在庚丙年合在辛丁年合在壬戊年合在癸已年合在甲庚年合在乙辛年合在丙壬年合在丁癸年合在戊此歲干隂陽之配合也用之主滅咎生祥
