body:
  text: 三十日在足趺陽明分剌之足跗音跗腫足背附太白逐日遊方不宜迎婚嫁娶往來抵向一起于震帝出平震也一日十一日二十一日皆一也二至巽二日十二日二十二日皆二也三至離三日十三日二十三日皆三也四至坤四日十四日二十四日皆四也五至兌五日十五日二十五日皆五也六至乾六日十六日二十六日皆六也七至坎七日十七日二十七日皆七也八至艮八日十八日二十八日皆八也九至中九日十九日二十九日皆九也十在天十日二十日三十日皆十也故逢一遊東逢二遊東南逢三遊南逢四遊西南逢五遊西逢六遊西北逢七遊北逢八遊東北逢九遊中逢十在天巡行八方上下如帝之巡狩也不可抵向犯之凡上官赴任出行求財皆忌長短星不宜市貿交易裁衣納財
  hash: sha256:ed9db77a5ac0ad3a057b91ad4a5ae88fd35473ea77bdc6f2ed491529fdcc97f8
