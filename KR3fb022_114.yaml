body:
  text: 不可造倉庫一云止忌修方其例如辰年則酉上是小耗亦是死符亥年則辰上是死符亦是小耗餘倣此大耗大耗居歲冲之位與歲破同歲破有不大耗其財損其人乎其例如丑年則未上是大耗戌年則辰上是大耗餘倣此黃旛豹尾黃旛太歲之墓也卽三合局之墓位其色黄旌旗也各居季土之地土色黄故曰黄旛亦爲歲君庫藏而曰華葢黃旛所指隨而變之動静疾速如豹尾然豹尾卽今之豹尾鎗也
  hash: sha256:28c1540c8228dca5dfd1b91055fbf65ad7aee48b67c8644f267d26f706a6c304
