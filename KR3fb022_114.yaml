body:
  text: 不可造倉庫一云止忌修方其例如辰年則酉上是小耗亦是死符亥年則辰上是死符亦是小耗餘倣此大耗大耗居歲沖之位與歲破同歲破有不大耗其財損其人乎其例如丑年則未上是大耗戌年則辰上是大耗餘倣此黃幡豹尾黃幡太歲之墓也即三合局之墓位其色黃旌旗也各居季土之地土色黃故曰黃幡亦為歲君庫藏而曰華蓋黃幡所指隨而變之動靜疾速如豹尾然豹尾即今之豹尾鎗也
  hash: sha256:9e245b55be1ef7612077ade1d0c620954d0c8ddde3c5a2fcb1b277138f0aa01d
