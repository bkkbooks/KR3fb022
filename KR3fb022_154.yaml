body:
  text: 遊在外可以修作若動作合得宜修之方更妙然出遊之方又不可犯之假如丁丑日是各神出遊日可以修作若所修之方是西更妙若是東是北雖亦可用再合得數吉星方穩然是日南方則不可修葢丁丑日各神所遊是南方也歲各省太陽出入書夜時刻各省序次悉依北極高度定緯所列每日一晝夜十二時共九十六刻按古法則一書夜共百刻四時無所增減晴雨未嘗盈縮雖晝夜有長短之不同亦惟于九十六刻推移其間自開闢至今永定不變獨太陽出入遲早與晝夜長短則有不同而于各省則尤不同葢測太陽出入晝夜長短時刻秉之極星出地高低定緯所列因天體渾圓而各省之地有偏東偏西偏南偏
