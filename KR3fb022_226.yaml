body:
  text: 夏至感隂生而角解從陽退之象麇隂獸也冬至感陽生而角解從隂退之象解脫也此所以各秉陽類隂類之不同也半夏生于夏之半因即以為名然候中所云曰生曰秀曰華其義有别也以别于死則曰生以别于苗則曰秀以别于實則曰華曰刻後曰躔鶉首之次夏至為五月中氣所云某日某時某刻乃交夏至之時刻也後者自交夏至時刻起至六月大暑中氣時刻前皆屬日躔鶉首之次鶉首未宮也宜用艮巽坤乾時艮時丑正三刻至寅初二刻巽時辰正三刻至已初二刻
