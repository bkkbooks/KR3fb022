body:
  text: 癸時子正三刻至丑初二刻乙時卯正三刻至辰初二刻丁時午正三刻至未處二刻辛時酉正三刻至戌初二刻紫黃緑子午卯白黑白辰戌丑碧白赤寅申已赤碧白酉上元年六月緑紫黃未中元年六月白白黑亥下元年六月黑白白是此局白赤碧是此局黃緑紫是此局此月家紫白九星立成上中下三元年分六月定局之圖也假如壬申年六月及甲申丙申戊申庚申年皆屬下元年分俱是第三局取用其餘五寅年五已年五亥年總屬下元年分皆是第三局其上元年分六月中元年分六月俱照此例取七月建申
