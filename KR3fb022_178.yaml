body:
  text: 至小寒大寒豳風云一之日觱發二之日栗烈觱發風寒故十一月為小寒栗烈氣寒故十二月之終為大寒也大抵合而言之上半年主長生曰雨曰雷曰風皆生之氣下半年主生成曰露曰霜曰雪皆成之氣下半年言天時不言農時農時莫急于春夏也先儒曰變者化之漸化者變之成立春雨水後寒氣漸變至立夏則寒盡化為暑矣小暑大暑其化固有漸也立秋處暑後暑氣漸變至立冬則暑氣盡化為寒矣小寒大寒其化亦有漸也右節氣各有諸方不同之數橫列于上欲知某省某節時刻縱橫查之即得真正時刻各節氣諸方不同之說巳見于前所謂數者時之某刻某分之數
