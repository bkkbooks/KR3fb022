body:
  text: 望者所見之地不同也朔初一朔蘇也月死復蘇也日月之交故曰合朔望十五日月對照如相望也人居其間盡覩其面是謂相與為衡居天之中而為望然望日非永定十五亦有十六十七之時弦上弦初八下弦草三弦弓弦也半明半晦半曲半直其形如弦此因日照其側人觀其旁是謂近一分逺三分也蓋天四分之人但見日照之一分而未見其所不能覩者之三分初八是月盈及一半如弓之上弦草三是月虛及一半如弓之下弦此以前後盈虛之不同而以上下二字别之也然上弦又非永定初八亦有初七初九之時下弦亦非永定草三亦有草二草四之時其上前
  hash: sha256:c3a2a3347e37a8d3a647e83e53ae63ac265e978d03d046b11837dcf3cb33ec9a
