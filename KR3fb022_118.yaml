body:
  text: 犯之損蠶桑大忌春間修作更凶其例如申年則辰上是蠶官辰年則戌上是蠶官餘倣此蠶室蠶室乃將軍之妻在將軍後三辰與力士對沖之位主絲繭綿帛之事季春之月后妃躬蠶以供祭服而蠶室乃起于坤者為卦老隂而母象也又蠶者火也四維者土之庫也火土之生生也所以巡行于四維也亦所以泄火蠶之氣也四隅者立極之地也天子萬幾非奏書何以通知其事理非博士何以詳考其利斃非力士何以無事為農而有事為兵非蠶室何以繅為衣服而主為祭祀故奏書博士力士蠶室必居四維有至理存焉
