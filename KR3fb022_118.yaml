body:
  text: 犯之損蚕桑大忌春間修作更凶其例如申年則辰上是蚕官辰年則戌上是蚕官餘倣此蚕室蚕室乃將軍之妻在將軍後三辰與力士對冲之位主絲蠒绵帛之事季春之月后妃躬蚕以供祭服而蚕室乃起于坤者爲卦老隂而母象也又蚕者火也四維者土之庫也火土之生生也所以巡行于四維也亦所以泄火蚕之氣也四隅者立極之地也天子萬幾非奏書何以通知其事理非愽士何以詳考其利獘非力士何以無事爲農而有事爲兵非蚕室何以繅爲衣服而主爲祭祀故奏書博士力士蚕室必居四維有至理存焉
