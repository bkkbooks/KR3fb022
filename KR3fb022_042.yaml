body:
  text: 西冷繆之晉半隱編輯大清康熙十年歲次時憲書年進也進而前也禾千成季季吉年字年以禾一歲而熟歲越也越故限也又木星也歲以星一歲而周木星越歷二十八宿宣遍隂陽十二月一次此星行一次而四時之功畢故謂之歲蓋木星即歲星也次次第也又次舍也時憲書乃本朝書名也如明之書曰大統元之書曰授時宋之書曰開禧之類是也都城順天府節氣時刻
  hash: sha256:dcdea19de9a07aa3be9527379357751a9ad89cd57369458e0ca98a22fe319fb8
