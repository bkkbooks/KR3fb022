body:
  text: 行乙丑六宮丙寅七宮丁卯八宮按序數至丁亥泊于宮故書上書丁亥土十五歲猪女一宮是也餘倣此其合婚之法則以男女所得宮數兩宮相合而成卦以審吉凶假如一命在一宮一命在四宮一四相合而成住氣卦為上吉男女生年宮數合成配卦定圖生氣貪狼星一四四一二八八二三九九三六七七六圖中無五數者以五為中天醫巨門星一八八一二四四二三六六三九七七九宮之數男寄二宮女寄八絶體彔存星一九九一二六六二三四四三八七七八宮隂艮陽坤遊魂文曲星一六六一二九九二三八八三四七七四以分左右凡生年泊中五五鬼亷貞星一七七一二二二二六四四六九八八九宮者男以坤二合卦女以
