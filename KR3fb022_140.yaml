body:
  text: 在庚皆取四旺處為月德之地也干尊支卑以三合本卦之陽干為德者尊君德而政惠逮下也此陰陽同類異位之德亦名生氣福德之辰所在之方萬福咸集宜拜封上表謁貴求賢上官赴任修造動土埋葬嫁娶移徙出行納財市賈立劵交易買畜百事吉用其所值之日用其所占之方其吉同其例如二月係卯月則月德在甲甲日為所值之日甲方為所占之方餘倣此天德合本厯末二五八十一月不取因此四月分天德係坤乾艮巽無能取合故也今復緑舊例者深明時俗以支强合之謬也正壬二巳世俗謬以巳合天德坤中之申三丁四丙五寅謬以寅合乾中之亥六巳七戊八亥謬以亥合艮中之寅九辛十庚十一申謬以申合巽中之巳十二乙
