body:
  text: 小暑是六月節某日某時某刻者交小暑之時刻也未交小暑時刻之前尚屬五月節氣司管凡諸六月內吉凶星煞及七十二候皆從交小暑之日時刻起夏至後十五日斗指丁為小暑後十五日斗指未為大暑小大暑就極熱中分之為大小初後為小望後為大也天道東行宜向東行宜修造東方天道乃天體運旋之氣六月節內行于東方而人趨向其方及修造此方所謂順天之道乘時之氣必有吉應天德在甲月厭在已月殺在戌月德在甲月合在巳月空在庚此六位所占方位年年六月節內永定不移內惟天德月德月合
  hash: sha256:b9baec037f6af209d707c4f52467a39464c95d4b5262499519ee310041e5270a
