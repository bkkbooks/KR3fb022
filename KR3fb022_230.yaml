body:
  text: 小暑是六月節某日某時某刻者交小暑之時刻也未交小暑時刻之前尚属五月節氣司管凡諸六月内吉凶星煞及七十二候皆從交小暑之日時刻起夏至後十五日斗指丁爲小暑後十五日斗指未爲大暑小大暑就極熱中分之爲大小初後爲小望後爲大也天道東行宜向東行宜修造東方天道乃天體運旋之氣六月節内行于東方而人趨向其方及修造此方所謂順天之道乘時之氣必有吉應天德在甲月厭在已月殺在戌月德在甲月合在巳月空在庚此六位所占方位年年六月節内永定不移内惟天德月德月合
  hash: sha256:9436c3b04aff7df366f53a1cda93a0cced9a0aafe8e41191f95d7ed75121b7a3
