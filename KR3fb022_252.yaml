body:
  text: 日刻日躔壽星之次秋分是八月中氣所云某日某時某刻乃交秋分之日時刻也後者自交秋分時刻起至九月霜降中氣時刻前皆属日躔壽星之次壽星辰宮也宜用艮巽坤乾時艮時丑正三刻至寅初二刻巽時辰正三刻至已初二刻坤時未正三刻至申初二刻乾時戌正三刻至亥初二刻赤碧黑子午卯綠紫白辰戌丑白白黃寅申已黃白白酉上元年八月黑赤碧未中元年八月白綠紫亥下元年八月紫白綠是此局白黃白是此局碧黑赤是此局
