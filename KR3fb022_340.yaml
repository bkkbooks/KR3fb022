body:
  text: 葢六十爲花甲之一週花甲之外可以按數推求故不復贅焉下卽附以某年閏某月者已往之閏易忌併紀之以便査攷也男幾宫女幾宮此合婚造作之用亦紀于是年之下者以便取合之簡㨗也十二生肖属相子鼠少光丑牛少齒寅虎短項卯兎缺唇辰龍虧聦巳蛇無足午馬虧聸未羊虧瞳申猴虧脾酉雞隱形戌狗無胃亥猪無筋十二辰之所属皆取二十八宿之中星如子宮女虚危則取虚日鼠爲子宮之中星也丑宮之中星牛金牛寅宮之中星尾火虎卯宮之中星房日兎辰宮之中星亢金龍已宮之中星翌火蛇午宮之中星星日馬未宮之中星鬼金羊申宮之中星觜火猴酉宮之中星昴日
  hash: sha256:5a671f61ecd0fdcf13e6d6167d1039a76480862f661da1ff50eca7405d4552da
