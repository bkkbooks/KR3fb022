body:
  text: 蓋六十為花甲之一周花甲之外可以按數推求故不復贅焉下即附以某年閏某月者已往之閏易忌併紀之以便查考也男幾宫女幾宮此合婚造作之用亦紀于是年之下者以便取合之簡捷也十二生肖屬相子鼠少光丑牛少齒寅虎短項卯兔缺唇辰龍虧聰巳蛇無足午馬虧聸未羊虧瞳申猴虧脾酉雞隱形戌狗無胃亥猪無筋十二辰之所屬皆取二十八宿之中星如子宮女虛危則取虛日鼠為子宮之中星也丑宮之中星牛金牛寅宮之中星尾火虎卯宮之中星房日兔辰宮之中星亢金龍已宮之中星翌火蛇午宮之中星星日馬未宮之中星鬼金羊申宮之中星觜火猴酉宮之中星昴日
  hash: sha256:a0637dc4f6686352be44396e376d6fb41c1cab131703ec2cf90e9620611b0ae1
