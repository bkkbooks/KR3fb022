body:
  text: 每以七日爲期每日各属一宿所謂宿者盖取七躍經行止宿之義且用以便于測筭經度也天文誌云星乃天之經宿乃天之緯故二十八宿迭運循環周流而無停息故書亦因之有年月日時逓一宿以司之較諸神煞附會起義者未可同日而語也建星十二建星次序建除滿平定執破危成收開閉起例如正月建寅則正月節内逢寅日卽是建卯日除辰日滿挨次順排十二辰二月建卯則二月節内逢卯日卽是建辰日除巳日滿午日平順排十二辰則每日之值日建星皆得矣餘月倣此例推
