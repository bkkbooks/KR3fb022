body:
  text: 在艮寅卯辰年在巽巳午未年在坤申酉戌年在乾常在歲前為羽林護衛之將居四維又乃四金之庫故有力士之象其例如丑年則艮上是力士申年則坤上是力士餘倣此官符畜官同又名地官符死氣官符縣官符一名牢獄官符自歲君本位起長生至五位則旺而為官符也四利三元以本支起建數至定位是例同也三所當趨五所當避起義本此捷訣則以子年起辰順行十二辰是也此興工動土開山立向修造犯之主口舌是非官災牢獄刑禁橫禍妨小口六畜而飛宮尤不可犯若犯山頭官災自內發若立向修方官災自外來其例如酉年則丑上是官符亦是畜官丑年巳上是官符亦是畜官餘倣此
