body:
  text: 也言物體皆成酉者日入之時乃陽正中八月也又云酉緧同緧息有切修上聲也萬物皆緧縮收斂九月戌陽未既也然不能事潛藏於戌戌中乃乾位戌為天門故也又云戌滅也萬物皆衰滅矣十月亥純隂也又亥劾也言隂氣劾殺萬物此地之道也天干始于甲而終于癸河圖生成之數也地支起于子而終于亥洛書奇偶之數也陽自復始六變而乾陽備隂自姤始六變而坤隂成合二六之數而為十二辰也夫甲丙戊庚壬陽幹也子寅辰午申戌陽枝也乙丁己辛癸隂幹也丑卯巳未酉亥隂枝也法以陽幹配陽枝隂幹配隂枝猶木之有幹而有枝自甲子為首以六甲五子次第推排而盡於癸亥仍以干支本數而計其成數總其
