body:
  text: 圖中吉凶神殺共三十二位太歲歲刑歲破歲殺劫殺災殺太隂奏書博士將軍力士官符飛廉大殺金神伏兵大禍破敗病符死符小耗大耗喪門弔客五鬼黃幡豹尾蠶官蠶室蠶命畜官白虎圖中神殺儼然邦國規模方位隂陽備具人情物理蓋太歲君而太隂后將軍力士博士奏書非佐理文武之臣乎蠶官畜官飛廉大殺非分曹任職之吏乎若乃宫室器用則黃幡豹尾蠶室將軍以著其象而物類昆蟲則蠶命白虎以兆其端况夫金神也則剛堅肅殺之機病符死符也凋落摧傷之候五鬼破敗大禍伏兵乘
