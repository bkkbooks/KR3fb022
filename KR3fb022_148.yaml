body:
  text: 隂生于午皆四時生旺之氣而無天枉者也春秋以戊土助其旺冬夏以甲木布其仁故曰天赦也天赦其罪而不傷害之乃赦過宥罪之神也內惟五月甲午十一月甲子雖是天赦却與天地轉殺日同加以月建壓動凡修造動土等事當酌用其例如立春節後九十日內遇戊寅日即是天赦夏秋冬倣此取母倉春亥子夏寅卯秋辰戌丑未冬申酉四季土王後巳午生我者曰母滿而實曰倉生我而積滿者也故曰母倉此正五行之母也如春為木亥子生之夏為火寅卯生之秋為金辰戌丑未生之冬為水申酉生之四季為土巳午生之宜起造婚姻受官移居交易作倉庫百事吉
