body:
  text: 孟春言候雁北自南而至北也此言來自北而來南也仲春言玄鳥至此言歸明春來而秋去也玄鳥燕子也至以陽中歸以隂中故所謂春社來秋社去社時恰在春分夏至前後也鴻雁不以中國而居然玄鳥之蟄不逺在四夷而亦不以中國為居者凡物之蟄近于本處惟玄鳥之蟄雖不逺四夷必于幽僻之處非中國之所常亦猶不以中國為居之意羞者所美之食群鳥藏之以偹冬月之寒也雷以陽中發聲隂中收聲至是而雷始收聲矣諸蟲坯益其蟄穴之戶使通明處稍小以時氣尚溫猶須出入至十月寒甚乃墐塞而閉之也水在氣之所為春夏氣至故長秋冬氣返故涸始將也涸竭也
