body:
  text: 刻之前尚屬二月節氣所轄凡諸三月內吉凶神煞及七十二候皆從交淸明日時之後起春分後十五日斗指乙為淸明言萬物至此皆潔齊而淸明矣後十五日斗指辰為谷雨言雨生百榖淸淨明潔也雨讀去聲天道北行宜向北行宜修造北方天道乃天體運旋之氣三月節內行于北方而人趨向其方及修造此方所謂順天之道乘時之旺自必吉應天德在壬月厭在申月殺在未月德在壬月合在丁月空在丙此六位所占方位年年三月節內永定不移內惟天德月德月合月空乃吉神月厭月殺乃凶煞
  hash: sha256:80cc3d272df188e9a0ff046b3f14bd8393242c6f47374ff80aa5e7772a59123b
