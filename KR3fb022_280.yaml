body:
  text: 小寒是十二月節某日某時某刻者交小寒之日時刻也未交小寒時刻之前尚屬十一月節氣司轄凡諸十二月吉凶神煞星辰及七十二候皆從交小寒日時刻之後起冬至後十五日斗指癸為小寒陽極隂生乃為寒今月初寒尚小也後十五日斗指丑為大寒至此栗烈極矣天道西行宜向西行宜修造西方天道乃天體運旋之氣十二月節內行于西方而人趨向其方或修造此方所謂順天之道乘時之氣有不獲其吉應者乎天德在庚月厭在亥月殺在辰月德在庚月合在乙月空在甲此六位所占之方位年年十二月節內永定無更內惟天德月德
