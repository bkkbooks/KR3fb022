body:
  text: 日刻驚蟄二月節驚蟄是二月節某日某時某刻者交驚蟄節之時刻也未交驚蟄時刻之前尚屬正月節氣主事凡諸二月內吉凶神煞及七十二候皆從交驚蟄日時之後起雨水後十五日斗指甲為驚蟄言蟄蟲震起而出也後十五日斗指卯為春分分半也當春分九十日之半也又曰陽也夜隂也故陽長而隂消則日長夜短隂短則陽消故日短夜長皆非隂陽之中也夫陽生于子終于午至卯而中分隂生于午終于子至酉而中分故春為陽中而仲月之節為春分秋為隂中而仲月之節為秋分春秋之分則隂陽適中而日夜無長短之差故于其月每言
  hash: sha256:8ea99a3b712a9e7f499f771ac2f72af83e0a3a7c26e7acb5809e7395e59f96b9
