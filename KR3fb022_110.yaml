body:
  text: 陽為伏兵陽之災來緩也故主有暗傷隂為大禍隂之禍烈也故遇凶無解二神犯之皆主立有災咎其例如午年則壬上是伏兵癸上是大禍餘倣此破敗五鬼破敗五鬼五行之精氣也主虛耗之事尤忌修造其例看納甲五行本年干屬於何卦其卦所對沖者是也蓋沖破納甲之辰也如乾納壬甲沖乾者巽也坤納乙癸沖坤者艮也艮納丙沖艮者坤也兌納丁沖兌者震也離納已而巳年在坎坎納戊而戊年在離震納庚而兌沖之巽納辛而乾沖之故曰破敗也曰五鬼者八卦不外干五行也甲年巽乙年艮丙年坤丁年震戊
