body:
  text: 寅午戌火月而逢金庫亥卯未木月而逢火庫申子辰水月而逢木庫己酉丑金月而逢水庫皆盗我氣而藏之者也故曰殺盖旣盗其氣不亦虚乎故亦名月虚忌造門及倉庫出財開張月德正月丙二月甲三月壬四月庚五月丙六月甲七月壬八月庚九月丙十月甲十一月壬十二月庚月德乃月中之陽德寅午戌火月德在丙申子辰水月德在壬亥卯未木月德在甲已酉丑金月德在庚干尊支卑以三合本卦之陽干爲德者尊君德而政恵逮下也上官諸事之所利用也此方爲生炁集福之地凡修造動土封拜上表謁貴求賢上官赴
  hash: sha256:2a1318c6737210f5fd242a3d61314ebf4ccc31af8f8bee79127df707b6f177df
