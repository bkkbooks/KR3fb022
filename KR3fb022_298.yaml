body:
  text: 寅午戌火月而逢金庫亥卯未木月而逢火庫申子辰水月而逢木庫己酉丑金月而逢水庫皆盜我氣而藏之者也故曰殺蓋既盜其氣不亦虛乎故亦名月虛忌造門及倉庫出財開張月德正月丙二月甲三月壬四月庚五月丙六月甲七月壬八月庚九月丙十月甲十一月壬十二月庚月德乃月中之陽德寅午戌火月德在丙申子辰水月德在壬亥卯未木月德在甲已酉丑金月德在庚干尊支卑以三合本卦之陽干為德者尊君德而政惠逮下也上官諸事之所利用也此方為生氣集福之地凡修造動土封拜上表謁貴求賢上官赴
  hash: sha256:b90cd24f5617f6c4ee271b121436d0fcb6eeb18603d318d445aee3908dad8555
