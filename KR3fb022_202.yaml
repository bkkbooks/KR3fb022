body:
  text: 候左右之時也雷是陽氣與隂相沖其聲發掦也電是陽光陽微則光不見此月陽氣盛以摯于隂故其光乃見也日刻後曰躔降婁之次春分為二月中氣所云某日某時某刻乃交春分之日時刻也後者自交春分時刻起至三月榖雨中氣時刻前皆屬日躔降婁之次降婁戌宮也宜用艮巽坤乾時艮時丑正三刻至寅初二刻巽時辰初三刻至正二刻坤時未正三刻至申初二刻乾時戌初三刻至正二刻緑紫白子午卯白白黃辰戌丑赤碧黑寅申已
  hash: sha256:e1f6241e9b8b5ebbd39e1d5aef525a1d1753e01033cfe754d00bf0b02471e251
