body:
  text: 洞原經黃幡時出乎軍中蓋張于庫上是也豹尾則居黃幡之沖虎賁之象先鋒之將也黃幡後坐豹尾前陳此之謂歟寅午戌年在戌申子辰年在辰巳酉丑年在丑亥卯未年在未其對沖之位即豹尾皆忌動土取土開門嫁娶納財收畜及作百事主損小口六畜豹尾方尤忌納有尾之畜其例如寅年則戌上是黃幡對沖辰上是豹尾餘倣此蠶官蠶官者司蠶之官也亥子丑年在未寅卯辰年在戌巳午未年在丑申酉戌年在辰蓋土神者養神也居歲之前而養育之居蠶室之後而司理之者也况季土之神桑柘之所産也
  hash: sha256:0c5e6eb71e2728aaeb7a1b3dc89b8e7d7e8ff17cdcc044db248e1c9b91945087
