body:
  text: 立冬小雪大雪冬至小寒大寒四立者四時之節氣也丑之終寅之始則為節月之半則為中二今者隂陽相半之謂也二至者至有二義子至巳為六陽午至亥為六隂至者介乎巳午亥子之間也冬至亥隂極故曰子子止也陽于此生故亦曰至夏至巳陽極故曰午午忤也隂于此生故亦曰至自秋分水始涸立冬水始水冬至水泉動大寒水澤腹堅為今之雨水者先是為露為霜為雪皆水氣凝結以至于寒之極春則暑氣順行而又為暑之始也况天一生水人物之生皆始于水春屬木木生于水立春後繼以雨水宜也卦氣正月為泰天氣下降當為雨水二月大壯雷在天上當為驚蟄先雨水而後驚蟄亦
