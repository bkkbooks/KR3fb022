body:
  text: 立冬小雪大雪冬至小寒大寒四立者四時之節氣也丑之終寅之始則爲節月之半則爲中二今者隂陽相半之謂也二至者至有二義子至巳爲六陽午至亥爲六隂至者介乎巳午亥子之間也冬至亥隂極故曰子子止也陽于此生故亦曰至夏至巳陽極故曰午午忤也隂于此生故亦曰至自秋分水始涸立冬水始水冬至水泉動大寒水澤腹堅爲今之雨水者先是爲露爲霜爲雪皆水氣凝結以至于寒之極春則暑氣順行而又爲暑之始也况天一生水人物之生皆始于水春属木木生于水立春後繼以雨水宜也卦氣正月爲泰天氣下降當爲雨水二月大壯雷在天上當爲驚蟄先雨水而後驚蟄亦
