body:
  text: 姻交易栽植及成就諸事皆吉收者聚斂也宜耕種收斂之財貸及捕捉等事開者闢也創也啓而通也百事俱吉惟忌安葬遁甲為地四戶通書為四大利星閉者塞也掩而合也不通之謂也宜安葬吉擇鑑云十二建星惟取除定危開四星為上吉在遁甲經為地四戶三元經為四大利其滿成執閉建破平收各有宜忌土王用事王讀旺四立前十八日為土王金木水火土各王七十二日而成歲功故四時各王七十二日惟土王于四季之月以助未之生金之成火之長
