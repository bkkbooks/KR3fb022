body:
  text: 坤時未正三刻至申初二刻乾時戌正三刻至亥初二刻白白黃子午卯赤碧黑辰戌丑緑紫白寅申已白緑紫酉上元年五月黃白白未中元年五月黑赤碧亥下元年五月碧黑赤是此局紫白緑是此局白黃白是此局此月家紫白九星立成上中下三元年分五月定局之圖也假如酉年五月酉是上元年分用上元第一局是也餘例推六月建未六月大小有不同之時而建未則永不更易未味也萬物向成咸有味也日刻小暑六月節
