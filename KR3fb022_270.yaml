body:
  text: 黃白紫子午卯黑赤白辰戌丑白緑碧寅申已碧白緑酉上元年十月紫黃白未中元年十月白黑赤亥下元年十月赤白黑是此局緑碧白是此局白紫黃是此局此月家紫白九星立成上中下三元年分十月定局之圖也如壬寅年十月書上是下元第三局圖蓋寅年是下元年分下元年分圖是第三局故取三局入書也餘以類推十一月建子十一月大小有不同之時而建子則永無改易子孳也謂陽氣至此更孳生也日刻大雪十一月節
