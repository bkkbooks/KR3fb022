body:
  text: 福德武曲星一三三一二七七二八六六八九四四九艮八合卦絶命破軍星一二二一三七七三四八八四九六六九二八代五爲歸魂左輔右弼星一一六六二二七七三三八八四四九九用也假如今康熈六十一年男十六歲戊子生男四宮女十五歲已丑生女三宮以男之宮數四配以女宮數三則合成四三爲絕體卦看絕體卦之吉凶以審取舍卦體吉凶合得生氣天醫福德爲上吉不避刑衝害絕約絞歲星惆悵夾角及胞胎有犯月内諸凶並無忌也合得絕體遊魂歸魂者謂之中等可以較量輕重合取命卦通和月中小忌亦可用惟五鬼主男女多口舌絕命主男女多疾病當斟酌去取再當以男
