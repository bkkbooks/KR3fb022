body:
  text: 力韜光歸縮兊位力微體弱明不及遠乃曰山下火也甲戌乙亥謂之山頭火者山乃藏形頭乃投光内明外暗隱而不顯飛光投乾歸於休息之中故曰山頭火也庚子辛丑何以取象壁上土氣居閉塞物尚包藏掩星遮體内外不交故曰壁上土戊寅己卯氣能成物功以育物發乎根荄壯乎萼蕊乃曰城頭土也丙辰丁已氣以成陽發生已過成齊未來乃曰沙中土也庚午辛未氣當承形物以露彰有形有質有物可彰乃曰路傍土也戊申己酉氣以歸息物當收斂龜縮退閑美而無事乃曰大驛土也丙戌丁亥氣成物府事以美圓隂陽歷遍勢得其間乃曰屋上土也
  hash: sha256:9fa6183fb49691d40a3f4a306ad7a276f743db7b6fc9b34d0c4b3ff5940fb627
