body:
  text: 之所宜同其例如正月節氣內逢丁日即是天德所值之日二月逢申日即是天德所值之日餘倣此歲德年干甲乙丙丁戊巳庚辛壬癸直看年橫推日甲庚丙壬戌甲庚丙壬戌日日日日日日日日日日宜上官赴任百事吉其例如甲年不拘何月但逢甲日即是歲德值日餘年倣此月德寅午戌月在丙申子辰月在壬亥卯未月在甲巳酉丑月
