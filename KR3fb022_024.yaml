body:
  text: 加箋釋凡厯之所載全民利用者條為兮而縷為析以副聖天子敬授斯民至意務使讀厯者吉凶避就觸目了然無事向剋擇之門奉其瞽論而閭左之用日以愈弘非敢謂有裨于朝廷之治竊與大清律箋釋之旨微有合爾且書中祇釋夲義馀無所及視太史公歷書之載大小餘
