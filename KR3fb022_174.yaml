body:
  text: 宜也驚蟄者萬物出乎震震爲雷也淸明者萬物齊乎巽巽爲風也巽潔齊而曰淸明淸明乃潔齊之義榖雨三月中自雨水後土膏脉動至此又雨則土脉生物所以滋五穀之種也小滿四月中先儒云小雪後陽一日生一分積三十日生三十分而成一晝爲冬至小滿後隂生亦然夫四月乾之終謂之滿者姤初六羸豕孚蹢躅坤初六履霜堅氷至羸豕喻其小蹢躅喻其滿履霜喻其小堅氷喻其滿易言于一隂旣生之後書言于一隂方萌之初慮之深防之預也小雪後有大雪此但有小滿無大滿意可知矣至若三月中榖雨五月中芒種北二氣獨指谷麥言谷必原其生之始谷種于春得木之氣殘于秋金剋木也麥必要其成之終麥種于
  hash: sha256:435832c91310c56aecf4dde73ca82e426b3e514d03e9ac7d353c771e5054ad32
