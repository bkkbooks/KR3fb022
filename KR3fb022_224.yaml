body:
  text: 丙辛壬上宜修造取土丙上有月德辛上有月合壬上有月空此三方吉神所占故宜修造取土是月也螳螂生芒種上五日即桑螵蛸鵙始鳴芒種中五日鵙音橘即伯勞也反舌無聲芒種下五日反舌即百舌鳥也以能反覆其舌而為百鳥語故名反舌鹿角解夏至上五日蜩始鳴夏至中五日蜩音迢即蟬也大者為蜩半夏生夏至下五日藥名也凡物皆秉隂陽之氣而成質其隂類者宜隂時陽類者宜陽時得時則興背時則廢螳螂鵙皆隂類也故或感微隂而生或感微隂而鳴至于反舌之鳴也感陽中而發故感微隂而無聲鹿陽獸也
