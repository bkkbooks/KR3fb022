body:
  text: 時者天地隂陽運行屈伸消長之迹也計其統則有元會運世之數也計其元則有上中下三元甲子之屬也計其歲則有支干之隸也計其序則有春夏秋冬四氣之流行也計其月則有二十四節氣之遞襌也計其節則有七十二候之氣化也計其日則有晨昏子午晝夜之分也計其時則有初正刻數之辨也是時之義與造化共其升沉與天地同其終始其時之往者來者未易具論而時之近者用者須亟審詳故一晝夜也分為二十四時得時者昌失時者殃此四大吉時所當首重而不可忽者譬之人命四柱生年月日皆吉而時不能合其吉則吉者反凶生年月日皆凶而時能化其凶則凶者轉吉所謂畫龍點晴晴即時之謂乎彼竒壬理
  hash: sha256:f163955b2210660e7d87a68efdebbb57605863675667f716df9350544fdc927e
