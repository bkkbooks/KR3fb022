body:
  text: 康京兆元河南平河內黃江夏姚吳興邵專陵湛豫章汪平陽狄云水臧東海伏太原成上谷茅東海龎平始項魯國祝太原梁安定杜京兆阮陳留席安定麻上谷强天水賈武威路內黃危晉江江淮陽顏魯國郭太原徐東海駱內黃蔡濟陽樊上黨萬扶風柯濟陽盧范陽莫巨鹿房清河解平陽杭餘杭左濟陽崔博陵鈕吳興程安定嵇譙國邢河間滑下邳裴河東榮上谷惠扶風邴平陽糜汝南巫平陽牧弘農山河內全京兆班扶風伊太原暴魏郡邰平原鄂武昌籍廣平藺中山隂始平能太原蒼武陵党馮翊申魏郡郤濟陽桑黎陽夀京兆通西河冀渤海尚黨上溫太原柴平陽慕燉煌習東陽向河內庚濟郡衡雁門匡晉陽文雁門歐平陽鞏山陽厙內黃巢彭城關隴西查汝南蓋汝南益馮翊蒯襄陽傅清河羊太山郗山陽闞天水南汝南商京兆佘雁門葉南陽鄞汝南留安南鐸鄱陽介河內慶河內長河南萇魏郡拔琅琊過高平靖臨清附南陽譙京兆
