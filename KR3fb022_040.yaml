body:
  text: 反易旨晦且恐讀者無所指歸若必欲探其原盡其蘊但于箋説中求之自得其中編輯失宜疏解舛誤及舉一漏百詳説未盡處應是不少伏祈海內名公先達博雅君子惠而教我樂莫大焉箋説嗣出客吳半巢主人繆之晉識
