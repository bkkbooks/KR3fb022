body:
  text: 移徙嫁娶百事不宜犯之主公事其例如寅年則戌上是飛亷戌年則子上是飛亷餘倣此大殺一名霹靂火大殺災殺之對宮乃三合居中之辰將星之位歲中之剌史也申子辰年在子已酉丑年在酉寅午戌年在午亥卯未年在卯犯之主官刑傷人財防殺傷之禍其例如辰年則子上是大殺丑年則酉上是大殺餘倣此金神金神乃白虎之神以本年五虎遁遇庚辛所臨之支為天金神遇納音屬金之干支為地金神曰七煞者從甲至庚為七也主兵戈
  hash: sha256:0b5e8db7a6d1817841c032b6bce48d4470dc77020850c8c98dd411b8f48bd1c2
