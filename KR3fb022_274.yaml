body:
  text: 合月空乃吉神月厭月殺是凶煞丙丁壬上宜修造取土丙上有月空丁上有月合壬上有月德此三方吉神所占故宜修造取土是月也鶡鴠不嗚大雪上五日虎始交大雪中五日荔挺出大雪下五日本草注荔挺即零陵香蚯蚓結冬至上五日麇角解冬至中五日水泉動冬至下五日鶡鴠夜嗚求旦之鳥蓋隂類也嗚而求旦則求陽而已故感微陽之生而不嗚則以得其求也虎隂物而交則亦感陽之生也凡物之氣感隂者腥感陽者香陽方長故荔挺出麋隂獸感陽生而角
