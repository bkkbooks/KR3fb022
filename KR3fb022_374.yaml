body:
  text: 月順從夫小月逆從婦者陽從夫之陽順隂從婦之隂逆也亦天尊地卑夫面南離婦立東房之義也五姓修宅凡人各有姓凡姓各有所属姓之所属惟五宮商角徵羽五音是也故曰五姓五音姓氏修造各有宜忌年月擇其所宜之月用事則吉不宜之月則忌之宮姓属土五姓各附郡名孫樂安馮始平沈吳與嚴天水魏鉅鹿陶濟陽水興吳范高平彭隴西鳯邰陽任樂安鄷京兆鮑上黨岑南陽倪千乗殷汝南明吳興計京兆談平廣宋京兆熊江陵屈臨海閔隴西童雁門林西河丘河南應汝南支鄙陽宗京兆郁黎陽麴吳興封渤海松東莞隗餘杭蓬長樂仲中山
