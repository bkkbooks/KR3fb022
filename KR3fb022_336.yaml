body:
  text: 退後之故因太陽之盈縮差與太隂之遲疾差乘除而定故朔望弦之時刻分數亦各有不同也晦大月三十小月草九灰也月死為晦月光盡似之也日照其表人在其裏日月相叠故暗其明也社日禮記祭儀曰共工氏之子曰勾芒為后土能平水土故祀之以為社神社土地之主也土地濶不能盡祭故封土為社以報功也原始曰社者地祇也萬物之生于土也二月之社以祈榖也八月之社以報功也古之春祈而秋報也用二八月之戊日為社者陽土之生成而濟民也立春後第五戊為春社立秋後第五戊日為秋社亦
  hash: sha256:6340dd43c03fe73c9cafe1b921439462001cc2b437b49b9fed2a7d8165da8fab
