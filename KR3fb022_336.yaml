body:
  text: 退後之故因太陽之盈縮差與太隂之遲疾差乗除而定故朔望弦之時刻分數亦各有不同也晦大月三十小月廿九灰也月死爲晦月光盡似之也日照其表人在其裏日月相叠故暗其明也社日禮記祭儀曰共工氏之子曰勾芒爲后土能平水土故祀之以爲社神社土地之主也土地濶不能盡祭故封土爲社以報功也原始曰社者地祇也萬物之生于土也二月之社以祈榖也八月之社以報功也古之春祈而秋報也用二八月之戊日爲社者陽土之生成而濟民也立春後第五戊爲春社立秋後第五戊日爲秋社亦
  hash: sha256:d36e409ee4b3566c28fa27ce98319d35c8458f5e03c488cf130f86c65b1c32c8
