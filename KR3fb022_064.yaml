body:
  text: 成數干支若干然後以五数除之以其所剩者約之以生五行之音是謂六甲納音其法以一六爲水二七爲火三八爲木四九爲金五十爲土如甲子乙丑以太玄數取之甲數九子數亦九乙數八丑數亦八共計之其數三十有四以五除之餘四數四數爲金故甲子乙丑屬音是金也又如戊辰已已其數二十有三以五除之餘三數三爲木故納音屬木庚午辛未其數三十有二二者火也土以火爲音故曰土甲申乙酉其數三十十者土也水以土爲音故曰水戊子巳丑其數三十有一一者水也火以水爲音故曰火凡六十甲子皆然但五行之中惟金木有自然之音而水必以土擊火必以水激
