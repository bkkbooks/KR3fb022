body:
  text: 成數干支若干然後以五數除之以其所剩者約之以生五行之音是謂六甲納音其法以一六為水二七為火三八為木四九為金五十為土如甲子乙丑以太玄數取之甲數九子數亦九乙數八丑數亦八共計之其數三十有四以五除之餘四數四數為金故甲子乙丑屬音是金也又如戊辰已已其數二十有三以五除之餘三數三為木故納音屬木庚午辛未其數三十有二二者火也土以火為音故曰土甲申乙酉其數三十十者土也水以土為音故曰水戊子巳丑其數三十有一一者水也火以水為音故曰火凡六十甲子皆然但五行之中惟金木有自然之音而水必以土擊火必以水激
