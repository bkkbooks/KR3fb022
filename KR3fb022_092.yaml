body:
  text: 加於已使金之失色未之臨申使水之壅塞戌之臨亥使水之無生皆是殺也犯之主傷子孫六畜官災疾病失財其例如子年則未上是歲殺戌年則丑上是歲殺餘倣此劫殺一名害氣一名殺氣劫殺乃三合局之絶位寅午戌年在亥水劫火也亥卯未年在申金殺木也申子辰年在巳火乾水也巳酉丑年在寅木屈金也犯之損人口招盜賊其例如卯年則申上是劫殺丑年則寅上是劫殺餘倣此災殺災殺乃三合局之胎位寅午戌年在子亥卯未年在酉申
