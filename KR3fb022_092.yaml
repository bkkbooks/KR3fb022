body:
  text: 加於已使金之失色未之臨申使水之壅塞戌之臨亥使水之無生皆是殺也犯之主傷子孫六畜官災疾病失財其例如子年則未上是歲殺戌年則丑上是歲殺餘倣此刧殺一名害氣一名殺氣刧殺乃三合局之絕位寅午戌年在亥水刧火也亥卯未年在申金殺木也申子辰年在巳火乾水也巳酉丑年在寅木屈金也犯之損人口招盗賊其例如卯年則申上是刧殺丑年則寅上是刧殺餘倣此災殺災殺乃三合局之胎位寅午戌年在子亥卯未年在酉申
