body:
  text: 午不苫盖主出火殃午旺火也未不服藥病不安康未者味也犯之失其味也申不安牀鬼崇入房申者伸也身也犯之身反不安也酉不會客醉生顛狂酉酒也犯酒則醉矣戌不乞狗作怪上房戌者犬之旺也大旺而怪作矣亥不嫁娶不利新娘亥爲雙女主再娶也忌有百今惟取二十二者以十支切緊當從而餘可緩焉者也祀竈日凡祀竈擇用六癸曰竈属火癸属水以六癸日祀竈水火相濟之意也洗頭日
