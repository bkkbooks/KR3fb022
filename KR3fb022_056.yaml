body:
  text: 歲字義從步從戌從步者纏躔之行可推步也從戌者木星之精生於亥自亥至戌而周天故曰步戌成歲戌與歲亦諧聲干猶木之幹强而為陽支猶木之枝弱而為隂蓋天氣始於甲干地氣起於子支乃聖人究隂陽重輕之用著名立號以彰其德以表其事禍福生死消長盈虛莫不由此以臻其妙用干支之義可不深究乎哉是以東方甲乙其位木得春之令甲乃陽丙而陰尚包之草木始甲而出也乙者陽過中然未得正方尚乙屈也又云乙軋音揠也萬物皆解莩甲自抽揠而出之莩甲草木初生之莩子薄皮也南方丙丁其位火行夏之令丙乃陽上而隂下隂內而陽外陽丁其强適然與隂氣相丁上丁字壯也下丁字當也又云丙炳也萬物皆炳然著見而强
