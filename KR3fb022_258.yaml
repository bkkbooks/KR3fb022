body:
  text: 丙上有月德辛上有月合壬上有月空此三方吉神所占故宜修造取土是月也鴻雁來賔寒露上五日雀入大水為蛤寒露中五日菊有黃華寒露下五日豹乃祭獸霜降上五日草木黃落霜降中五日蟄蟲咸俯霜降下五日雁以仲秋先至者為主季秋後至者為賔如先登者為主人從之以登者為客也雀于此時入海變蛤飛物化為潜物也菊色不一而專言黃者秋令金其色黃以黃為正也桃華于仲春桐華于季春皆不言有獨菊言有者以萬物皆華于陽獨菊華於隂故物言有桃花之紅桐花之白皆不言其色獨菊言其色而曰黃者以華
  hash: sha256:6df22cb192623b727b1da10f130a22e347136b1f9d7b3255c3740ea2b889a5c9
