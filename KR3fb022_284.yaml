body:
  text: 以生乳也此月殺氣盛極故鷹集征鳥之類嚴猛捷速以取鳥也氷之初凝于水面而已至此則徹上下皆凝故曰腹堅腹猶內也其堅達內非特形于水面而已然前言水泉此言水澤泉乃水之源澤乃水之潤曰刻後曰躔玄枵之次大寒為十二月中氣所云某日某時某刻乃交大寒之時刻也後者是交大寒時刻起至來年正月雨水中氣時刻前皆屬日躔玄枵之次玄枵子宮也宜用癸乙丁辛時癸時子正三刻至丑初二刻乙時卯正三刻至辰初二刻
