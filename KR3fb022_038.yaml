body:
  text: 謂其的于何所主管何所司屬則未敢確謂其然也至其情性之不同氣化之純駁所以敷施或異是殆理之所固然又未可以為妄誕也厯本文皆用大字其中有用者因其隨時更易不能一定故以圈記之箋釋諸說或由經傳或出叢書今不記出某書者因余丙申居王峯時諸友以厯書相質問隨意編輯無刊布之心故未及詳記况內有斷章取義者亦有參以臆見而集為一說者不敢妄指出自某書間有詳述者皆丙申後所編也厯中之理錯綜紛雜各條之下僅言其㫖明顯易知而止若多繁衍
  hash: sha256:370bc62d74bbca4fc3c2a412fc024963d95ff27e2b8350c116a3a506cb1c4089
