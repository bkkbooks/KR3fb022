body:
  text: 甲乙庚上宜修造取土甲上有月空乙上有月合庚上有月德此三方吉神所占故宜修造取土是月也螻蟈鳴立夏上五日螻蟈靠也蚯蚓出立夏中五日王瓜生立夏下五日王瓜萆挈也本草作菝葜音同謂之瓜者以根之似也亦可釀酒苦菜秀小满上五日靡草死小满中五日麥秋至小满下五日螻蟈鳴則隂而伏者乘陽而鳴也蚯蚓出則隂而屈者乘陽而伸也王瓜赤色感火之色而生四月火旺故生此物苦菜味苦感火之味而成秀成也靡草草之枝葉靡細者葶孽之属也夫物感陽
