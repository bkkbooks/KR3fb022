body:
  text: 年離巳年坎庚年兌辛年乾壬年巽癸年艮其例如乙年則艮上是破敗五鬼辛年則乾上是破敗五鬼餘倣此病符病符即舊太歲也在歲後一辰即閉位病而老廢于家者也與帝輅同犯之主疾病損人招瘟疫其例如子年則亥上是病符卯年則寅上是病符餘倣此死符小耗死符以其居時令之絶地故曰死符歲前五辰執位取之大小耗皆虛耗之神遇破為大耗而遇執則為小耗焉故小耗與死符同例蓋執吝者亦漸耗也犯之有亡遺之事或損六畜血財其方
  hash: sha256:34dc91ad95d61e3c0335d901065330ec1c8358a3832979e02c231e48f6998aec
