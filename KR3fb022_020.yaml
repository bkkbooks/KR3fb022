body:
  text: 自序敬授民時朝廷大典也既禁私習之人恐其妄言禍福以煽惑無知之類復頒時憲厯于天下使知一嵗內吉凶所宜年以統月月以繞日太陽出入書夜刻兮織悉臚列即嵗德天道九宫紫白百忌周堂六靡不宣示焉如
