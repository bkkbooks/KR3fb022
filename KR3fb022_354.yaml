body:
  text: 日遊神所在之方不宜安産室掃舍宇設床帳按日遊神惟十六日在房內分占東西南北中五方其所在占方不宜安産室掃舍字設床上帳自已酉後四十四日出遊在外不占五方無忌逐日人神所在不宜針灸人神者六氣隂陽之表裹也忌針灸一日在足大指厥隂分剌之發跗腫二日在外踝少隂分剌之筋脛緩膝下至外踝一尺六寸三日在股內少隂分剌之小腹痛四日在腰太陽分剌之腰僂無力五日在口太隂分剌之舌強六日在手陽明分剌之咽喉不利七日在內踝少隂分剌之隂筋急踝華上聲脛兩旁內外通曰踝足骨也膝至內踝一尺六寸八日在腕手腕也太隂分刻之腕不收九日在尻厥隂分剌之主多病尻脽也脊梁盡處尻年聲
