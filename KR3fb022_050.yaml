body:
  text: 餘日置閏於其間然後四時不差歲功得成閏者歲之樞紐斗之所建為中氣日月所會在斗柄所指之辰無中氣則置閏之月故閠前之月中氣在晦閠後之月中氣在朔無中氣則謂之閠月也月某月大小之下橫列兩小字某干支乃本月朔值日之甲子也日刻分月節月中此某日某刻某分即下之節氣時刻也四時成歲以春夏秋冬各司九十日零而有四立為四時之首立春立夏立秋立冬是也即四孟月也驚蟄芒種白露大雪為四仲
