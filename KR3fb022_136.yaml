body:
  text: 五日遊一方若所出遊之五日内任作無忌故須併工修作若不併工延至五日外則各神還位不吉矣故曰併工修營無妨併工者多其匠工以數日之事而以一日爲之也其太歲已下神殺出遊日本歷之末有例可查今更詳其説于後天德正丁二坤申宮三壬四辛同五乾亥六甲上七癸八艮寅逢九丙十居乙子十一月巽巳丑十二月庚中天德日宜興工動土修營拜封上表上官赴任造葬移居求財出行市價結姻藏胎衣百事俱吉天德值日固吉而所占之方爲尤吉葢此方爲隂陽開通福德之地其所宜用之事皆與上值日
  hash: sha256:64413affa22d423602df8a7670341295d81a73c0e7bf3cd506cbc6909e611c84
