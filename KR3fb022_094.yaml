body:
  text: 子辰年在午巳酉丑年在卯犯之主人財衰耗災生不測其例如巳年則卯上是災煞亥年則酉上是災殺餘倣此劫殺災殺歲殺謂之三殺者如寅午戌會火局也而亥子丑之水不附焉乃恃水而剋火以賊劫其歲而亥孟神也劫之始也子仲神也災所由興也丑季神也藏奸而為歲君之難者也故曰三殺如亥卯未則從亥至未而申酉戌不在合內者矣申子辰從申至長而巳午未不在合內者矣己酉丑從巳至丑而寅卯辰不在合內者矣金以犯木火以乾水木以屈金如羣盜焉黨而劫其君也然合三殺之中仲神主之孟神始之季神藏而合之者也劫災的三殺此通天竅相尅之位也如申子辰年會水殺在南方巳午未初為劫殺言其驟也中為災殺言其傷也未為的殺言其决也殺同而取義異耳太隂太隂自子年起戌順行十二辰在太歲之後二辰謂之歲后即貴
  hash: sha256:cfc4f6f965ea175171d9f3fac365affbb4d0c06576341d65a1bd9c530c522c1e
