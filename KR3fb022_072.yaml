body:
  text: 傍離宫火明勢盛水得歸庫盈科後進乃曰長流水也丙午丁未氣當升降在高明火位有水沛然作霖以濟火中之水惟天上乃有故曰天河水甲申乙酉氣息安靜子母同位出而不窮汲而不竭乃曰井泉水壬戍癸亥天門之地氣歸閉塞水歷遍而不趨勢歸乎寧謐之位來之不窮納之不溢乃曰大海水也戊子己丑何以取象霹靂火蓋氣在一陽形居水位水中之火非神龍則無故曰霹靂火丙寅丁卯氣漸發輝因薪而顯隂陽為冶天地為爐乃曰爐中火也甲辰乙巳氣形盛地勢定高岡傳明繼晦子母相承乃曰覆燈火也戊午巳未氣過陽官重離相會炳靈交光發輝災上乃曰天上火也丙申丁酉氣息形藏勢
