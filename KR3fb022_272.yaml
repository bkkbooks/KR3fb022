body:
  text: 大雪是十一月節某日某時某刻者交大雪之時刻也未交大雪時刻之前尚屬十月節氣所轄凡諸十一月內吉凶星辰及七十二候皆從交大雪時刻之後起小雪後十五日斗指壬為大雪言積隂為雪至此而栗列天矣後十五日斗指子為冬至隂極而陽始至日南至漸長至也天道東南行宜向東南行宜修造東南維天道乃天體運旋之氣十一月節內行于東南而人趨向其方式修造此方所謂順天之道乘時之氣利有攸往應獲吉徵天德在巽月厭在子月殺在未月德在壬月合在丁月空在丙此六位所占方位年年十一月節內永定不移內惟天德月德月
