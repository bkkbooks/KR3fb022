body:
  text: 以成功者也用子者天子居北而南面以聽政也卯酉者日月之門也故起于甲子巳卯巳酉而不起于甲午者南面係奏書之位天空之方臣下朝聘之位天子不北面也故是日宜覃恩頒赦上官參選受封行禮嫁娶造葬入宅裝塑佛像並吉其例不拘何月但逢上所列干支即是如六月初五日是癸未其日即是天恩值日也餘倣此天赦春戊寅夏甲午秋戊申冬甲子甲為干德之首戊為干德之中子午為隂陽之正寅申為隂陽之成皆天地中正之氣故天寶厯曰陽盛于寅隂盛于申陽生于子
  hash: sha256:9a6ccac14483349df18240c1c08d91935699209f2fd214f82ef9b3d8e8271cc2
