body:
  text: 焉按朝鮮周爲箕子所封之國卽高麗也属遼東外徼京師直隸順天府都城之地也其節氣時刻已見于開卷首頁其太陽出入書夜時刻已載于每月内每日條下不並列于外省者重王畿之省也假如江南一省欲查本省太陽出入遲早晝夜時刻長短但看直行内江南二大字按月按日横推自得餘倣此江南省不得誤認盛京之太陽出入晝夜時刻盛京不得誤認山西省之太陽出入晝夜時刻盛京十四省不得誤認每月内每日下都城直隸之太陽出入遲早晝夜時刻此最易明之事而人忽之嘗見各省人查太陽出入書夜時刻不按本省查而在每月每日條下查用則誤
