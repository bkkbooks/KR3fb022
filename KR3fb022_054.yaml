body:
  text: 之時而本月之中永無不在本月之内本月不見中氣則閠月矣凡三百五十日一年日與月會十二次得全日三百五十四日若其年有閠月則加三十日若閠月小則加二十九日此皆永定一年之日數也日有一年三百五十五日之時此又零分累積成一日故加一日也如以日與天會一歲氣週而言則少十一日弱氣週者如今年立春數至明年立春二十四氣全數則三百六十五日零太歲在幹枝納音屬太歲者總司一年四時十二月二十四氣天地隂陽吉㐫消長之道故冠之以太字所以尊崇之也太古泰字經史古太字無點後人加點以別大小
