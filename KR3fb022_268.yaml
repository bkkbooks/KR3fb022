body:
  text: 物矣隂陽氣交而爲虹此時隂陽不相交故虹伏虹非有質而曰藏亦言其氣之下伏也天氣上騰地氣下降則天地各正其位而不交矣不交則不通不通則閉塞所以閉塞而成冬矣日刻後日躔析木之次小雪乃十月中氣所云某日某時某刻者交小雪之日時刻也後者自交小雪之時刻起至十一月冬至中氣時刻前皆属日躔析木之次析木寅宮也宜用甲丙庚壬時甲時寅正三刻至卯初二刻丙時已正三刻至午初二刻庚時申正三刻至酉初二刻壬時亥正三刻至子初二刻
