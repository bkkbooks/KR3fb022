body:
  text: 下角字是艮位右下角字是乾位左上角字是巽位右上角字是坤位其餘例推自明假如今上元庚子年起九星訣係上元一白起甲子則乙丑九紫丙寅八白丁卯七赤按訣逆加九星于逐年則庚子年係一白是值年星以值年一白星入中宮按法順飛出九星則二黑在乾右下角三碧在兌右行中四緑在艮左下角五黃在離中行上六白在坎中行下七赤在坤右上角八白在震左行中九紫在巽左上角所以上元庚子年九星方位圖是後式上元庚子年年赤坤位碧兌位黑乾位神方位圖中間黃離位白中宮白坎位紫白九星八卦紫巽位白震位緑艮位九宮圖是此局
