body:
  text: 閏月閏月但有大小之時而無干支之建斗之所建為中氣今閏無中氣何建為故閏前之月中氣在晦閏後之月中氣在朔十曰刻月節閏月無中氣而有節氣閏月大則十六日交下月節閏月小則十五日交下月節以前作月用以後作月用上半月尚屬前月節氣故作前月用凡一應神殺星辰九宮紫白七十二候等類皆從前月節氣取用下半年已屬後月節氣故作後月用凡一應神殺星辰九宮紫白七十二候等類皆從後月節
