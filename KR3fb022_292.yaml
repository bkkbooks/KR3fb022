body:
  text: 求每月建干五虎遁訣甲已之年丙作首乙庚之歲戊為頭丙辛之歲尋庚上丁壬壬位順行流更有戊癸從何起甲寅正月好追求假如辛年欲如正月建干其訣係丙辛之歲尋庚上則正月建庚寅二月建辛卯三月建壬辰按其甲子順排十二月建干皆得矣天道正月南行二月西南行三月北行四月西行五月西北行六月東行七月北行八月東北行九月南行十月東行十一月東南行十二月西行天道乃天體運旋自然之旺氣與天德同義天德其體而天道其
