body:
  text: 之事蓋物得氣之先殺氣未肅而鷙猛之鳥已習于摯迎殺氣之微也凉風未至而鳴隂之物已居于壁迎凉風之微也腐草得署溫之氣化而為螢離明之極故幽類化為明類也土之氣潤故蒸螢而為濕署六月建未主東井井主水土即潤溽則大雨應時而行日刻後日躔鶉火之次大暑為六月中氣所云某日某時某刻乃交大暑之日時刻也後者自交大暑時刻起至七月處署中氣時刻前皆屬日躔鶉火之次鶉火午宮也宜用癸乙丁辛時
  hash: sha256:d8cae470fa7f30dfa9917ec0b8241221703183c3c7c05aa86f2a38db96bc9924
