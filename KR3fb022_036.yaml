body:
  text: 理全四時之序正崇象緯自然之正宗蘋通書不經之邪說順之者昌違之者殃人曷不究其理以求無大過哉厯內所載種種條項但箋其說明解而已似可不必再詳其原苐恐不探其本此中精蘊終難大白于世故不厭周詳不惟所以然之說必欲備陳即參互考訂之義亦皆具悉吉凶神煞之名奇異迭出若或真有其神焉要知此亦古人原其隂陽五行生剋衰旺所自來之義以取象立名使人易于依循稱謂耳即如諸天星之命名或因其倣佛形似或因其光色或因其情性或名以官以國以人以物以事種種借義稱名咸以便司天氏之仰觀耳又如六十甲子納音海中金爐中火之類亦猶是也若
  hash: sha256:9a22184810ce84cf8b4e0332018fccecffdbe7ce3f37fef91b6d1508f1da1989
