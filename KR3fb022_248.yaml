body:
  text: 造此方者順天之行乗時之氣自必有吉以應之天德在艮月厭在卯月殺在辰月德在庚月合在乙月空在甲此六位所占方位年年八月節内永定不更内惟天德月德月合月空乃吉神月厭月殺是凶煞甲乙庚上宜修造取土甲上有月空乙上有月合庚上有月德此三方吉神所占故宜修造取土是月也鴻雁來白露上五日玄鳥歸白露中五日群鳥養羞白露下五日雷始收聲秋分上五日蟄蟲坯戶秋分中五日水始涸秋分下五日
