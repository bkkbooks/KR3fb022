body:
  text: 之一歲二十四節氣三百六十五日所得之常数少五日零爲朔虚一歲二十四節氣每一節氣有十五日零總計零分之數其得三百六十五日零此太陽一日一度一年一周天之常數故今年冬至數至明年冬至則三百六十五日零較之歲有十二月月有三十日三百六十日一歲之常數則日與天會多五日零爲氣盈以氣盈朔虛二數合之而閠生焉三歲一閠五歲再閠十九歲七閠氣朔分齊是爲一章二十七章爲一會三會爲一統三統爲一元若三年不置閠則春之一月入於夏而時漸不定矣子之一月入於丑而歲漸不成矣積之久久至於三失閠則春入於夏而時令不定矣十二失閠則子入於丑而歲全不成矣故必以此
  hash: sha256:e2734368f33638e17d8a419589f79e42f186734febdbe4996add87872c79142c
