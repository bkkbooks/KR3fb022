body:
  text: 每歲太陽出入晝夜刻分前後前謂正二三四五頂格月分之類後謂六七八九十底格月分之類各有相同之日如辛丑年二月十一日同八月十五日十二月初一日同十月初七日之類而天體渾圓諸方各省也太陽出入晝夜刻分又自不同故將刻分相同之日即前工頂格正月初日同十月初日之類對書于格之上下上即格之上乃上頂格橫寫順看之日下即下底格橫寫逆看之白以便省覽而又明列各省于首直行首行直看大字欲知某省某月時刻縱橫查之即得真正時刻渾天言天地如鳥卵天包地外如卵白地在天中如卵黃周天三百六十五度四分度之一半在地上半在地下南北有樞極旋轉斜倚地中北極出地三十六度半南極入地三十六度半兩極之中處為赤道如帶繫天之中日月星辰俱斜轉上下為晝夜出入
  hash: sha256:163413d7b6415af76791b23c89c3c2991a2ff5934d746dc77a46b8d74a1447a6
