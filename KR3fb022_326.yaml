body:
  text: 宜于播種五榖栽植樹木而獲倍收耳定者安也止也不爽不易之謂也宜結婚下定安石墩埋葬皆吉遁田經為地四戶執者持也攝也固也拘留之謂也宜出行放債納畜立倉庫等類破者剖也缺也裂也不全之謂也宜破巢搗穴解釋寃愆針灸治病散事和公等事危者高也險也不安象也思危則安人能安而思危則吉多凶少故十二建星凶多吉少惟除危開三星吉多凶少遁甲經為地四戶通書為四大利星成者就也畢也善也從戊從丁戊土也丁成也謂物成于中也宜婚
  hash: sha256:9b56b56733dceb14f5ed6ee770d894f818bd09262681eeb1d9ebc77e15261f66
