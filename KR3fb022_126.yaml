body:
  text: 此方位無吉凶神殺所占是空位也故曰空黑赤白一白位坎休門屬水二黑位坤死門屬土三碧位震傷門屬木四緑位巽杜門屬木紫黃白五黃居中屬土緑碧白六白位乾開門屬金七赤位兌驚門屬金八白位艮生門屬土九紫位離景門屬火此年神方位圖中央所列之紫白九星也出于洛書戴九履一左三右七二四為肩六八為足五寄中宮為王因其敘以成九疇蓋河圖圓洛書方圓者天體星也紀厯之數兆于河圖方者地體土也書州井田之法倣于洛書掌中按指節排布九宮順飛則從中五次乾六再次兌七以及艮八離九坎一坤二震三巽四按其順數而行逆飛則從中五次巽四又次震三以及坤二坎一離九艮八兌七乾六按其逆數而行餘倣此
  hash: sha256:b825d3d2d54a26c9996925e0509f312912b227f85ab3cf468b32725a64547509
