body:
  text: 演禽經有值年值月值日值時四禽星而書中惟用值日禽星其始從天元歲積宿策纍除算至今康熙二十三年上元甲子年禽畢月鳥天正月禽室火猪冬至日禽尾火乕子半時禽昴日雞二十八宿次序角木蛟亢金龍氐土貉房日兔心月狐尾火虎箕水豹斗木獬牛金牛女土蝠虛日鼠危月燕室火猪壁水貐奎木狼婁金狗冒土雉昴日雞畢月烏參水猿觜火猴井水犴鬼金羊柳土獐星日馬張日鹿翼火蛇軫水蚓此二十八宿各以一宿分列每日之下為值日禽星內以房虛星昴四宿為屬太陽之日心尾畢張為屬太隂之日是外五緯各屬四宿
