body:
  text: 北距極遠近之不同故太陽出入亦有遲早之不同晝夜時刻亦有長短之不同也書夜長短遁遷繇于日行南陸北陸故日在南陸而寒晝短日在北陸而燠晝長然二至短長互相易夏至之晝為冬至夜冬至之晝為夏至夜假如冬至晝三十八刻三分則夏至夜亦三十八刻三分夏至晝五十七刻六分則冬至夜亦五十七刻六分此定例也盛京山西山東朝鮮河南陝西江南湖廣浙江四川江西福建廣西貴州雲南廣東本朝定天下人為兩京京師直隸盛京即遼東十四省江南陝西山東浙江山西江西河南湖廣福建四川廣東貴州廣西雲南兩京十四省之外朝鮮亦在同文之內故與
