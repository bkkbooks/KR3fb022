body:
  text: 凉風至則天地之仁氣散矣白露降則隂乘陽而其候交矣寒蟬鳴則物之生于暑者其聲變矣鷹乃祭鳥謂鷹欲食鳥之時先殺鳥而不食似人之食必祭先代為食之人鷹至不仁也必祭而後食而况于人乎此言時主殺氣而物之司殺者應時而動也秋者隂之始冬者隂之終秋屬金金乃肅殺之氣故于孟秋言天地始肅禾黍稷之屬至此時而皆成熟矣故曰禾乃登日刻曰躔鶉尾之次處暑為七月中氣所云某日某時某刻者交處暑之時刻也後者自交處暑時刻起至八月秋分中氣時刻前皆屬日躔鶉尾之次鶉尾已宮也
  hash: sha256:c9e578350a6ab0fe7101e61ba4483f5d74b8c2c31100d45ce91af179e5eaf3cf
