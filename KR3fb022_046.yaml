body:
  text: 大小每月日與月會自有前後零分度數之不齊故有月大月小之異然每年惟月大者六月小者六有恒例也苐月之大小先後錯綜不一者此又推歩家因其嬴餘不及之数在先在後而定也閠月一歲十二月一月三十日一年三百六十日此一歲之常數也每一月日與月會一次核其實月行二十九日半强而與日會固不必足三十日而始與日會也十二個二十九日合之得三百四十八日是一歲月行之常數餘分并積又成六日加六日於三百四十八日之中故月與日會十二次一歲通共得三百五十四日較
  hash: sha256:7c4a93192eb2cff4c01d0d9afb6f8571af6924286517175524374c6b7c35c237
