body:
  text: 黃道為冬夏大略如是歲各蒙古太陽出入晝夜時刻各蒙古序次悉依地圖北極高度定緯所列各蒙古皆在車書一統之內故頒朔亦及焉但其所居之處亦如中國各省南北東西相距遠近之不一故悉依地圖測北極出地高下緯度以定太陽出入之時刻晝夜長短之時刻亦同中國之分測法也本朝厚德配天凡有血氣者莫不尊親故各蒙古風向化者歲有所增月有所加今皆不及詳録每歲太陽出入晝夜刻分前後各有相同之日而天體渾圓諸方太陽出入書夜刻分又自不同故將刻分相同之日對書于格之上下
  hash: sha256:e127a7621179e44dd3b242a72115b8252bee502114f2248617bafd8947630e3f
