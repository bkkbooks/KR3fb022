body:
  text: 亥子丑年坤寅卯辰年乾巳午未年艮申酉戌年巽犯之損蚕桑春間修作犯之尤不宜主年年損蚕其例如丑年則坤上是蚕室午年則艮上是蚕室餘倣此蚕命蚕命蚕之命也子年在未丑年在午寅年在亥卯年在戌辰年在巳巳年在丑午年在寅未年在申申年在卯酉年在辰戌年在子亥年在酉犯之損蚕桑其例如午年則寅上是蚕命丑年則午上是蚕命餘倣此喪門弔客喪門弔客主死喪哭泣之事百事並凶更不宜行喪葬埋主招哭
  hash: sha256:e05cc2d489c11ae9277af84420fc5cd5e0d83da79fe78fc33ddd232d6085b6a9
