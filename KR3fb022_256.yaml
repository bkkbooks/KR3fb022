body:
  text: 皆從交寒露日時之後起秋分後十五日斗指辛為寒露謂露已冷寒而將欲凝結矣後十五日斗指戌為霜降氣肅露凝結而為霜矣天道南行宜向南行宜修造南方天道乃天體運旋之氣九月節內行于南方而人趨向其方及修造此方皆謂乘時之氣必獲吉應天德在丙月厭在寅月殺在丑月德在丙月合在辛月空在壬此六位所占方位年年九月節內永定不移內惟天德月德月合月空乃吉神月厭月殺是凶煞丙辛壬上宜修造取土
