body:
  text: 二刻彼省立夏是正一刻以本省而用別省之時刻亦誤矣又如十一日半夜子時誕育上四刻屬十一日管下四刻方屬十二日管若誕育于上四刻者則爲夜子時故厯中明有夜子時之別昧者不察概曰子時竟差一日之五行矣更有書夜長短刻分不于本省例内求而于每月每日條下看此又誤以順天爲本省矣種種混拈比比而是今不及備述始舉數端以見厯之不可不研解其理耳厯中首詳各省節氣時刻及晝夜長短諸例天之道也次列八卦方位二十四山九宮紫白諸局地之道也中列十二月七十二候等類時之道也内復備人事之趨避吉㐫之向背人之道也三才之
  hash: sha256:17c13a7e37437f504c9590409e0a687000166307580213e20c45954734868438
