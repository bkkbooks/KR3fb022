body:
  text: 二刻彼省立夏是正一刻以本省而用別省之時刻亦誤矣又如十一日半夜子時誕育上四刻屬十一日管下四刻方屬十二日管若誕育于上四刻者則為夜子時故厯中明有夜子時之別昧者不察概曰子時竟差一日之五行矣更有書夜長短刻分不于本省例內求而于每月每日條下看此又誤以順天為本省矣種種混拈比比而是今不及備述始舉數端以見厯之不可不研解其理耳厯中首詳各省節氣時刻及晝夜長短諸例天之道也次列八卦方位二十四山九宮紫白諸局地之道也中列十二月七十二候等類時之道也內復備人事之趨避吉凶之向背人之道也三才之
  hash: sha256:8c1197ab82142775c1f088e5e4eb50a3e878f7966152c7b35f19939f0d66b03a
