body:
  text: 丙丁壬上宜修造取土丙上有月空丁上有月合壬上有月德此三方吉神所占故宜修造取土是月也桐始華淸明上五日田鼠化為鴽淸明中五日虹始見淸明下五日萍始生谷雨上五日鳴鳩拂其羽谷雨中五日戴勝降于桑谷雨下五日戴勝一名戴篤桐始華記樹木之時候也田鼠化為鴽鴽鵪鶉之屬隂類也反歸舊形之化也虹螮蝀也天地訌潰之氣純陽純隂則虹不見隂于陽則見陽若得中則隂莫能干至此月建辰陽已過中生氣大盛陽氣發泄隂陽漸交感而虹見矣萍始生則以隂物之浮以承陽
