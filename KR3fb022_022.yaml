body:
  text: 大清律例刑法兮載而并示人以尊卑儀註輿服喪制等禮易扵遵行其意一也近日家置一夲不耐尋繹遇事則問飞剋擇家盲師牧䜿上下其説一惟其口是聴而不知所取心六如日用服制之舍禮律而撿家禮其謬略同大清律自王肯堂司寇註後苕中錢之清纂輯箋釋一書廣為刊布四方無苦讀律之難而厯獨闕焉之晉有志扵此採輯多年
