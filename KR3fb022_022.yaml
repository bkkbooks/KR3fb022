body:
  text: 大清律例刑法兮載而并示人以尊卑儀注輿服喪制等禮易于遵行其意一也近日家置一夲不耐尋繹遇事則問飛剋擇家盲師牧豎上下其說一惟其口是聽而不知所取心六如日用服制之舍禮律而撿家禮其謬略同大清律自王肯堂司寇注後苕中錢之清纂輯箋釋一書廣為刊布四方無苦讀律之難而厯獨闕焉之晉有志于此採輯多年
