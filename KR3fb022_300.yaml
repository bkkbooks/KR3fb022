body:
  text: 任嫁娶移徙納財買畜交易契券百事並吉月合卽月德合正月辛二月已三月丁四月乙五月辛六月已七月丁八月乙九月辛十月已十一月丁十二月乙月德所合之干也以隂干之妻配陽干之德天地交合上下同志夫婦一心也凡修造動土拜表上官遠行結婚祭祀開張移徙納財畜種植並吉月空一名月慶正月壬二月庚三月丙四月甲五月壬六月庚七月丙八月甲九月壬十月庚十一月丙十二月甲
