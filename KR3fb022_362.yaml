body:
  text: 庚不經絡機纖虛張庚金剪裁刑剋之金也辛不合醬主人不嘗辛者味之辛而不甘者也壬不決水難更隄坊壬為江河之水决之不盡也癸不詞訟理弱敵强癸為干之窮如理窮而詞屈也子不問卜吉凶不彰天地蒙晦而未分也丑不冠帶威武不揚暗金晦神也寅不祭祀鬼神不享寅鬼門也卯不穿井水泉不香卯雷門也動之地也動則不潔矣辰不哭泣恐有飛喪辰為天罡悲哭生不祥也已不遠行不出井鄉已蛇無足者也不能遠行
  hash: sha256:403e7d6b66b7534dcd0b13843da567048a0d6cb41acda0abba055b30e631b696
