body:
  text: 庚不經絡機纖虚張庚金剪裁刑剋之金也辛不合醬主人不嘗辛者味之辛而不甘者也壬不決水難更隄坊壬爲江河之水决之不盡也癸不詞訟理弱敵强癸爲干之窮如理窮而詞屈也子不問卜吉凶不彰天地蒙晦而未分也丑不冠帶威武不揚暗金晦神也寅不祭祀鬼神不享寅鬼門也卯不穿井水泉不香卯雷門也動之地也動則不潔矣辰不哭泣恐有飛喪辰爲天罡悲哭生不祥也已不遠行不出井鄉已蛇無足者也不能遠行
  hash: sha256:95df0bff80b9261f533a2f725f81d4a299f00bc366d38f43e168a505b42a40d7
