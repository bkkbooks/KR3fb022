body:
  text: 鶉火之次宿直柳星張支應午宮曰獅子將曰勝光大暑後太陽所躔鶉尾之次宿直翼軫支應已宮曰雙女將曰太乙處暑後太陽所躔壽星之次宿直角亢支應辰宮曰天秤將曰天罡秋分後太陽所躔大火之次宿直氐房心支應卯宮曰天蝎將曰太衝霜降後太陽所躔柝木之次宿直尾箕支應寅宮曰人馬將曰功曹小雪後太陽所躔星紀之次宿直斗牛支應丑宮曰磨羯將曰大吉冬至後太陽所躔玄枵之次宿直女虚支應子宮曰寳瓶將曰神后太寒後太陽所躔四大吉時卽四煞沒時孟月用甲丙庚壬陽干以得孟神之生氣盖寅甲巳丙申庚亥壬之同宮也仲月用乙丁辛癸隂干而卯乙同宮午丁酉辛子癸之一炁
  hash: sha256:59eb3c33f3028995546bb70dbcca42a5ff36c6235d249d99ac6384b3ddce6cc0
