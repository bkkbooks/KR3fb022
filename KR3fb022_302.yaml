body:
  text: 月德對干爲月空乃月内隂辰吉慶之位宜動土取土修造奏疏設謀上言安俢産室造床帳百事並吉忌入學此六位吉凶神殺每月内書中專指占方而言若是月内所用之日辰值此數神之支干卽爲是袖值日其吉凶宜忌占方與值日同十二次舍赤道宮次娵訾之次宿直室壁支應亥宮曰雙魚將曰登明雨水後太陽所躔降婁之次宿直奎婁支應戌宮曰白羊將曰河登春分後太陽所躔大梁之次宿直胃昴畢支應酉宮曰金牛將曰從魁榖雨後太陽所躔實沈之次宿直觜參支應申宮曰隂陽將曰傳送小滿後太陽所躔鶉首之次宿直井鬼支應未宮曰巨蟹將曰小吉夏至後太陽所躔
  hash: sha256:4dd713c591f442f6b3b57c1c86089363b31717ceba6dfaf373317ed95dabe40a
