body:
  text: 是辰便爲五龍治水餘倣此亦惟占候家用之年神方位之圖吉㐫神殺有從年起者有從月起者有從日從時起者此乃從年起之神殺其圖按九宫八卦二十四山佈成定位以便查覽如欲葬埋修造動作但查所用山方位上有何吉㐫神殺詳其吉㐫衰旺宜忌趨避之理而酌用之是圖名二十四山用後天八卦方位加之以八干十二支共成二十四位先用羅經子午針格定南北以定二十四山真正方位然後人用干不用十而用八以戊巳二干屬土不居八方而居中宫也戊陽土寄乾巽巳隂土寄坤艮
  hash: sha256:8fbd980b96fc81adbfaac4b57076160ef26c820ce76211a337f57294bad47287
