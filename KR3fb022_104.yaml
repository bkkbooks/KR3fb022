body:
  text: 飛廉一名飛廉大殺卽月凶大殺飛廉歲之廉察使也子年子月在申丑在酉寅在戌者子丑寅陽水之將終而金氣助之也卯辰巳年月萬物之發生也而用巳午未之火以暄之午未申年月萬物之將成矣而用寅卯辰之木以助之酉戌亥年月而歸北方亥子丑以歛之其起于四正之辰者亷察無私之義也捷訣子午寅申丑未年遁尋成位是飛亷卯酉巳亥辰戌歲但逢滿位此神占曰大煞者子丑寅陽氣之初而有西金之肅氣卯辰已陽氣雖長而過于巳午未之發生午未申乃萬物之將成而反有東方寅卯辰之戰金酉戌亥乃萬物之始歛而乃遇亥子丑之寒凝故曰煞也其方忌起造動土
