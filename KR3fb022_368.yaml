body:
  text: 寅午戍月以子中霹靂之火而冲午中正陽之火也亥卯未月在卯以卯中爐中之火而發震雷之火也申子辰月在午以午中天上之火而激子中霹靂之火也已酉丑月在酉以酉中之丁火而發酉中山下之火也此天道自然之火不測而生者也其例如二月逢卯日卽是天火八月逢酉日卽是天火餘月倣此上朔日今年但逢日爲上朔日不宜會客作樂上者陽生于子今用亥亥在子上隂生于午今用已巳在午上朔者蘇而復生也上朔二字之義本此其例則陽年以年干加寅隂年以年干加丑陽年數至亥隂年數至巳則得上朔日矣寅爲艮之鬼門丑乃物之終極收歛而無發生之氣且陽年干受生于日
