body:
  text: 五鬼五鬼子年起辰逆行十二辰辰為天罡而逆行以為虛耗之殺也犯之主虛耗失財病崇如值歲月合日祭祀修福助之吉其例如戌年則午上是五鬼巳年則亥上是五鬼餘倣此白虎白虎居歲後四辰連歲數之後五之凶神也若以鬼神論之後五白虎宜于子年起未順行十二辰今從申起者以申位有參觜之白虎也主喪服兵凶百事忌其例如亥年則未上是白虎卯年則亥上是白虎餘倣此空
