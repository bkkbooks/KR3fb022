body:
  text: 已及時枝葉茂盛蔚然成林取其木之盛也故曰大林木壬午癸未木至午而死至未而墓故楊柳盛夏葉凋枝幹微弱取其性之柔也故曰楊柳木庚申辛酉五行為金而納音屬木以相尅取之蓋木性辛者惟石榴木申酉氣歸靜肅物漸成實木居金地其味成辛故曰石榴木若他木至午而死惟此木至午而旺取其性之偏也戊戌己亥氣歸藏伏隂陽閉塞木氣歸根伏乎上中故曰平地木也丙子丁丑何以取象澗下水蓋氣未通濟高假非水流之所卑濕乃水就之鄉由地中行故曰澗下水甲寅乙卯氣出陽明水勢恃源東流滔注其勢浸大故曰大溪水壬辰癸巳勢極東南氣
  hash: sha256:bda67d6a870903239b4d4a816babdda911414131ca2f788407749ba03361e475
