body:
  text: 每年一易五年而仍還其原干要知每年正月是何建干但以五虎遁年上求月取之五虎遁例見後日刻立春正月節立春為正月節氣所云某日某時某刻者乃交立春節之時刻也凡立春時刻之前尚屬舊年十二月節氣所轄蓋諸月家吉凶神煞及七十二候皆從本月節起不從本月朔起故凡屬正月不從正月朔起必從立春節起也假如正月初一日正直立春則無參前落後之分今立春不在初一而在初六則正月初一至初五尚作舊年十二月節氣主事此則節未至而朔先到者也又如舊年十二月十八立春則十八日即作新年正月節主事凡正月神煞
  hash: sha256:6626ec357dd3b6ec82a6f71ad782dfea86a8a0f5398a49f758b2ae0133152fa8
