body:
  text: 有第六戊為社者因立春立秋便見戊字取得節時刻在午前定五戊為社如在午後六戊為社也三伏火伏而土旺以生秋金也所謂先甲三日者庚也况庚金將旺而火伏也夏至後第三庚為初伏四庚為中伏立秋後逢庚為末伏若五庚在立秋前不為末伏須用見秋方是如夏至日遇庚便為一庚數起紀年紀年者紀其自今年起逆推巳往六十年之干支納音也以便查閲年歲干支十二生肖之所屬故自本年起一歲逆推至六十歲而止
