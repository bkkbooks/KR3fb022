body:
  text: 用也凡人趨向之及修造此方所謂順天之時得天之旺自獲祉福之應故嫁娶出行移徙一切動作值之皆吉天德正月丁二月坤三月壬四月辛五月乾六月甲七月癸八月艮九月丙十月乙十一月巽十二月庚天德天之福德也四孟月取其旺神之上所臨之天于以爲德四仲月取墓神之歸藏而含蓄以爲德四季月取庫之旺以爲德所在之方爲福德萃聚之地凡興工動土起造安葬修營移居入宅上官出行結婚求福求財藏胎衣百事並吉月厭大禍一名地火
